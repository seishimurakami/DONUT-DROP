<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DONUT DROP 🍩</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0015;
  --accent: #ff6bcd;
  --accent2: #ffcc00;
  --accent3: #00f5d4;
  --text: #fff5ff;
  --glow-pink: 0 0 20px #ff6bcd88, 0 0 40px #ff6bcd44;
  --glow-yellow: 0 0 20px #ffcc0088, 0 0 40px #ffcc0044;
  --glow-cyan: 0 0 20px #00f5d488, 0 0 40px #00f5d444;
  /* iPhoneのノッチ・ホームバーの高さ */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Fredoka One', 'Kosugi Maru', ui-rounded, sans-serif;
  color: var(--text);
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, #2a004488 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, #00223388 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, #330044aa 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

#bg-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.4; pointer-events: none; }

.scanlines {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 50;
}

/* ── Shared overlay / button ── */
#overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,10,0.88);
  border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; backdrop-filter: blur(6px); gap: 18px;
}
#overlay h1 {
  font-size: 34px; text-align: center; line-height: 1.2;
  color: var(--accent); text-shadow: var(--glow-pink);
  animation: overlayGlow 2s ease-in-out infinite;
}
@keyframes overlayGlow {
  0%,100%{text-shadow:var(--glow-pink);}
  50%{text-shadow:0 0 40px #ff6bcd,0 0 80px #ff6bcd88;}
}
#overlay .sub {
  font-size: 13px; color: rgba(255,255,255,0.5);
  text-align: center; line-height: 1.7;
}
.btn {
  background: linear-gradient(135deg, var(--accent), #cc44aa);
  border: none; border-radius: 50px; padding: 13px 38px;
  font-family: ui-rounded, -apple-system, sans-serif; font-size: 19px;
  color: white; cursor: pointer;
  box-shadow: 0 0 20px rgba(255,107,205,0.5), 0 4px 20px rgba(0,0,0,0.4);
  transition: all 0.2s; letter-spacing: 1px;
  animation: btnPop 1.5s ease-in-out infinite;
}
.btn:hover { transform: scale(1.07); animation: none; }
.btn:active { transform: scale(0.97); }
@keyframes btnPop { 0%,100%{transform:scale(1);} 50%{transform:scale(1.03);} }

/* ── Pause banner ── */
#pause-banner {
  display: none; position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%); will-change: transform;
  font-family: 'Fredoka One', cursive; font-size: 58px;
  color: var(--accent); text-shadow: 0 0 30px rgba(255,107,205,0.9);
  pointer-events: none; z-index: 950; white-space: nowrap; letter-spacing: 5px;
}
#pause-banner.visible {
  display: block;
  animation: pausePop 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pausePop {
  0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
}

/* ── Combo flash (shared) ── */
#combo-flash {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 54px; color: var(--accent2);
  text-shadow: 0 0 40px #ffcc00, 0 0 80px #ffcc0066;
  pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.1s;
  white-space: nowrap;
}
#score-popup {
  position: fixed; font-size: 22px;
  font-family: ui-rounded, -apple-system, sans-serif;
  color: var(--accent3); text-shadow: var(--glow-cyan);
  pointer-events: none; z-index: 100; opacity: 0;
}

#copyright {
  position: fixed; bottom: max(10px, env(safe-area-inset-bottom, 0px));
  left: 0; right: 0; text-align: center;
  font-size: 10px; color: rgba(255,255,255,0.4);
  z-index: 50; letter-spacing: 0.5px;
}
#copyright a { color: rgba(255,255,255,0.7); text-decoration: none; }

/* ── Game canvas shared ── */
#game-canvas {
  display: block; image-rendering: pixelated;
  border: 2px solid rgba(255,107,205,0.5); border-radius: 12px;
  box-shadow: 0 0 30px rgba(255,107,205,0.3), 0 0 60px rgba(255,107,205,0.1), inset 0 0 30px rgba(0,0,0,0.5);
}
#particle-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; border-radius: 12px; }

/* ════════════════════════════════════
   MOBILE LAYOUT（iPhoneはこちら）
════════════════════════════════════ */
[data-mode="mobile"] #app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  height: 100dvh; gap: 0;
}

[data-mode="mobile"] #topbar {
  width: 100%; display: flex; align-items: center; justify-content: center;
  padding: max(6px, var(--safe-top)) 12px 10px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,107,205,0.2);
  flex-shrink: 0;
}
[data-mode="mobile"] #title-top {
  font-family: 'Fredoka One', cursive;
  font-size: 20px; color: var(--accent); letter-spacing: 2px;
  text-shadow: var(--glow-pink);
  animation: titlePulse 3s ease-in-out infinite;
}
[data-mode="mobile"] #title-top span { color: var(--accent2); }

[data-mode="mobile"] #game-area {
  display: flex; align-items: flex-start; justify-content: center;
  gap: 6px; flex: 1; padding: 5px 4px 2px; min-height: 0;
}
[data-mode="mobile"] #game-area.battle-mode {
  align-items: center; justify-content: center; gap: 4px; padding: 4px 4px 2px;
}
.battle-vs-col {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--accent); font-size: 18px; line-height: 1; flex-shrink: 0;
}
.battle-vs-col .vs-label {
  font-size: 8px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase;
}
[data-mode="mobile"] .side-mini { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; width: 74px; margin-left: -5px; }
[data-mode="mobile"] .mini-box {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,107,205,0.25);
  border-radius: 10px; padding: 5px 5px; text-align: center; min-width: 0;
}
[data-mode="mobile"] .mini-box .lbl { font-size: 9px; color: var(--accent3); letter-spacing: 1px; display: block; margin-bottom: 1px; }
[data-mode="mobile"] .mini-box .val { font-size: 17px; color: var(--accent2); text-shadow: 0 0 8px rgba(255,204,0,0.5); line-height: 1; }
[data-mode="mobile"] #game-canvas { border-width: 1.5px; border-radius: 10px; }

[data-mode="mobile"] #controls {
  width: 100%; display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 50px);
  gap: 5px;
  padding: 5px 8px max(22px, calc(var(--safe-bottom) + 2px));
  flex-shrink: 0;
}
[data-mode="mobile"] .menu-icon-row { display:flex; gap:4px; justify-content:center; margin:8px 0 6px; }
[data-mode="mobile"] .menu-icon-btn {
  background:rgba(255,107,205,0.12); border:1px solid rgba(255,107,205,0.3);
  border-radius:7px; width:24px; height:24px; font-size:13px;
  display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .15s;
}
[data-mode="mobile"] .menu-icon-btn:active { background:rgba(255,107,205,0.3); transform:scale(0.9); }
[data-mode="mobile"] .menu-mini-link {
  display:flex; align-items:center; gap:4px;
  font-size:8px; color:rgba(255,255,255,0.5);
  text-decoration:none; padding:4px 0; transition:color .2s;
  white-space:nowrap; overflow:hidden;
}
[data-mode="mobile"] .menu-mini-link .mli {
  width:16px; text-align:center; flex-shrink:0; display:inline-block;
}
[data-mode="mobile"] .mini-box-hi {
  flex: 3; display: flex; flex-direction: column; justify-content: center; padding: 10px 5px;
}
[data-mode="mobile"] .mini-box-menu {
  flex: 3; display: flex; flex-direction: column; justify-content: center; padding: 10px 5px;
}
#copyright {
  position: fixed; bottom: 6px; left: 0; right: 0;
  text-align: center;
  font-size: 10px; color: rgba(255,255,255,0.4);
  z-index: 50; letter-spacing: 0.5px;
  pointer-events: none;
}
#copyright a { color: rgba(255,255,255,0.7); text-decoration: none; pointer-events: auto; }
[data-mode="mobile"] .ctrl-btn {
  background: rgba(255,107,205,0.1); border: 1.5px solid rgba(255,107,205,0.35);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; height: 50px; cursor: pointer; transition: all 0.1s; position: relative;
}
[data-mode="mobile"] .ctrl-btn.active {
  background: rgba(255,107,205,0.25); border-color: var(--accent);
  box-shadow: 0 0 12px rgba(255,107,205,0.5); transform: scale(0.93);
}
[data-mode="mobile"] .ctrl-btn.large { font-size: 14px; color: rgba(255,255,255,0.9); }

/* ── 対戦モード CSS ── */
.mode-select-btns { display:flex; flex-direction:column; gap:12px; align-items:center; }
.btn-battle-mode {
  background:linear-gradient(135deg,#ff6b6b,#cc4444);
  border:none; border-radius:50px; padding:12px 34px;
  font-family:ui-rounded,-apple-system,sans-serif; font-size:18px;
  color:white; cursor:pointer; letter-spacing:1px;
  box-shadow:0 0 20px rgba(255,100,100,0.5),0 4px 20px rgba(0,0,0,0.4);
  animation:btnPop 1.5s ease-in-out infinite;
}
.btn-mp-mode {
  background:linear-gradient(135deg,#00b4d8,#0077b6);
  border:none; border-radius:50px; padding:12px 34px;
  font-family:ui-rounded,-apple-system,sans-serif; font-size:18px;
  color:white; cursor:pointer; letter-spacing:1px;
  box-shadow:0 0 20px rgba(0,180,216,0.5),0 4px 20px rgba(0,0,0,0.4);
  animation:btnPop 1.5s ease-in-out infinite;
}
.mp-peer-btn {
  background:rgba(0,180,216,0.12); border:1px solid rgba(0,180,216,0.5);
  border-radius:12px; padding:10px 16px; width:100%;
  font-family:'Fredoka One',ui-rounded,sans-serif; font-size:14px;
  color:white; cursor:pointer; text-align:left;
}
.mp-peer-btn:active { background:rgba(0,180,216,0.25); }
.com-level-grid {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:6px; width:100%; margin-bottom:10px;
}
.com-level-btn {
  background:rgba(255,255,255,0.06); border:2px solid rgba(255,107,205,0.4);
  border-radius:10px; padding:6px 3px;
  font-family:ui-rounded,-apple-system,sans-serif; font-size:11px;
  color:white; cursor:pointer; text-align:center;
}
.com-level-btn:active { background:rgba(255,107,205,0.2); transform:scale(0.95); }
.com-level-locked { opacity:0.25 !important; cursor:default !important; pointer-events:none !important; }
.com-level-btn .lv-num  { display:block; font-size:8px; color:rgba(255,255,255,0.4); margin-bottom:2px; }
.com-level-btn .lv-emoji { font-size:17px; display:block; margin-bottom:3px; }
.com-level-btn .lv-name { display:block; font-size:9px; margin-bottom:2px; line-height:1.2; }
.com-level-btn .lv-diff { display:block; font-size:7px; color:rgba(255,255,255,0.4); }
.btn-back-lv {
  background:none; border:1px solid rgba(255,255,255,0.3);
  border-radius:50px; padding:7px 20px;
  font-family:ui-rounded,-apple-system,sans-serif; font-size:13px;
  color:rgba(255,255,255,0.5); cursor:pointer; margin-top:6px;
}
.battle-topbar { width:100%; display:flex; justify-content:center; align-items:center; gap:4px; }
.battle-stat { text-align:center; flex-shrink:0; }
.battle-lbl { display:block; font-size:8px; color:var(--accent3); letter-spacing:1.5px; }
.battle-val { font-size:14px; color:var(--accent2); text-shadow:0 0 8px rgba(255,204,0,0.6); }
.battle-vs { font-size:13px; color:var(--accent); letter-spacing:2px; }
#com-canvas {
  display:block; image-rendering:pixelated;
  border:1.5px solid rgba(100,200,255,0.5); border-radius:10px;
  box-shadow:0 0 20px rgba(100,200,255,0.2);
}

/* ── トップへもどる確認 ── */
#esc-overlay {
  display: none; position: fixed; inset: 0; z-index: 450;
  background: rgba(10,0,21,0.88); backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
#esc-card {
  background: rgba(255,107,205,0.07); border: 1.5px solid rgba(255,107,205,0.4);
  border-radius: 22px; padding: 28px 22px; width: min(300px, 88vw);
  display: flex; flex-direction: column; gap: 16px; text-align: center;
}
#esc-card .esc-title { font-family:'Fredoka One',cursive; font-size:20px; color:var(--accent2); }
#esc-card p { font-size:13px; color:rgba(255,255,255,0.65); line-height:1.9; margin:0; }
.esc-btn-row { display:flex; flex-direction:column; gap:10px; }
#esc-cancel { background:var(--accent); border:none; border-radius:14px; padding:13px; font-family:'Fredoka One',cursive; font-size:15px; color:#fff; cursor:pointer; letter-spacing:1px; }
#esc-yes { background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.2); border-radius:14px; padding:12px; font-size:13px; color:rgba(255,255,255,0.65); cursor:pointer; }

/* ── Settings Modal ── */
#settings-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(10,0,21,0.88); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
}
#settings-card {
  background: rgba(255,107,205,0.07);
  border: 1.5px solid rgba(255,107,205,0.4);
  border-radius: 22px; padding: 28px 22px;
  width: min(320px, 88vw);
  display: flex; flex-direction: column; gap: 22px;
}
.settings-title {
  font-size: 13px; font-weight: bold; letter-spacing: 3px;
  color: var(--accent3); text-align: center; text-transform: uppercase;
}
.settings-section { display: flex; flex-direction: column; gap: 10px; }
.settings-lbl {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent3);
}
.slider-row { display: flex; align-items: center; gap: 10px; }
#bgm-slider {
  flex: 1; -webkit-appearance: none; height: 4px;
  border-radius: 2px; background: rgba(255,255,255,0.18); outline: none;
}
#bgm-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
  box-shadow: 0 0 10px rgba(255,107,205,0.7);
}
.bgm-val {
  font-size: 11px; color: rgba(255,255,255,0.55);
  width: 34px; text-align: right;
}
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
}
.toggle { position: relative; display: inline-block; width: 50px; height: 28px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0; border-radius: 14px;
  background: rgba(255,255,255,0.18); transition: background 0.2s;
}
.toggle-track::before {
  content: ''; position: absolute;
  width: 22px; height: 22px; left: 3px; top: 3px;
  border-radius: 50%; background: #fff; transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle input:checked + .toggle-track::before { transform: translateX(22px); }
#settings-close {
  background: rgba(255,107,205,0.15);
  border: 1.5px solid rgba(255,107,205,0.45);
  border-radius: 14px; color: rgba(255,255,255,0.9);
  font-size: 14px; padding: 13px; cursor: pointer;
  letter-spacing: 1px; width: 100%;
}
.settings-divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 0; }
#btn-reset-data {
  background: rgba(255,60,60,0.1); border: 1.5px solid rgba(255,80,80,0.4);
  border-radius: 12px; padding: 11px; width: 100%;
  font-size: 13px; color: rgba(255,130,130,0.9); cursor: pointer;
  letter-spacing: 0.5px;
}
#reset-confirm { display: none; background: rgba(255,30,30,0.08); border: 1px solid rgba(255,80,80,0.3); border-radius: 12px; padding: 14px 12px; }
#reset-confirm p { font-size: 12px; color: rgba(255,180,180,0.9); margin: 0 0 12px; text-align: center; line-height: 1.8; }
.reset-btn-row { display: flex; gap: 8px; }
#btn-reset-yes { flex: 1; background: rgba(255,40,40,0.28); border: 1px solid rgba(255,80,80,0.55); border-radius: 10px; padding: 9px 0; font-size: 13px; color: #ff9999; cursor: pointer; }
#btn-reset-cancel { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 10px; padding: 9px 0; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; }
/* 対戦結果フルスクリーンオーバーレイ */
#battle-result {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(10,5,20,0.92);
  flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; text-align: center; padding: 28px;
}
#battle-result h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.2rem, 10vw, 3rem);
  color: var(--accent2); text-shadow: 0 0 30px rgba(255,204,0,0.6); margin: 0;
}
#battle-result .sub {
  font-family: 'Kosugi Maru', sans-serif;
  font-size: 14px; line-height: 2.1; color: rgba(255,255,255,0.75); margin: 0;
}
#battle-result .btn-row {
  display: flex; flex-direction: column; gap: 12px;
  align-items: center; width: min(280px,90vw);
}
#battle-result .btn-menu {
  background: transparent; border: 2px solid rgba(255,255,255,0.25);
  border-radius: 50px; padding: 12px 0; width: 100%;
  font-size: 14px; font-family: 'Kosugi Maru', sans-serif;
  color: rgba(255,255,255,0.65); cursor: pointer; transition: all .2s;
}
</style>
</head>
<body>
<div class="scanlines"></div>
<canvas id="bg-canvas"></canvas>
<div id="combo-flash"></div>
<div id="pause-banner">PAUSE</div>
<div id="score-popup"></div>
<div id="app"></div>

<div id="esc-overlay">
  <div id="esc-card">
    <div class="esc-title">⏸ ゲームを中断しますか？</div>
    <p>トップにもどると、今のゲームは終了します。</p>
    <div class="esc-btn-row">
      <button id="esc-cancel">▶ ゲームにもどる</button>
      <button id="esc-yes">🏠 トップへもどる</button>
    </div>
  </div>
</div>
<div id="battle-result">
  <h1 id="battle-result-title"></h1>
  <div class="sub" id="battle-result-sub"></div>
  <button class="btn" id="battle-result-next" style="display:none;"></button>
  <div class="btn-row">
    <button class="btn" id="battle-result-retry">🔄 もう一度！</button>
    <button class="btn-menu" id="battle-result-menu">🏠 トップへもどる</button>
  </div>
</div>

<div id="settings-overlay" style="display:none">
  <div id="settings-card">
    <div class="settings-title">⚙&nbsp; SETTINGS</div>
    <div class="settings-section">
      <div class="settings-lbl">BGM ボリューム</div>
      <div class="slider-row">
        <input type="range" id="bgm-slider" min="0" max="100" value="70">
        <span class="bgm-val" id="bgm-val-label">70%</span>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-lbl">効果音 ボリューム</div>
      <div class="slider-row">
        <input type="range" id="sfx-slider" min="0" max="100" value="50">
        <span class="bgm-val" id="sfx-val-label">50%</span>
      </div>
    </div>
    <div class="settings-section">
      <div class="toggle-row">
        <span class="settings-lbl">バイブレーション</span>
        <label class="toggle">
          <input type="checkbox" id="haptic-toggle" checked>
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
    <hr class="settings-divider">
    <div class="settings-section">
      <div class="settings-lbl">データ管理</div>
      <button id="btn-reset-data">🗑 データ初期化</button>

function weightedRandom(weights) {
  let r = Math.random() * weights.reduce((a,b)=>a+b,0);

function buildImpulse(ctx, dur=0.8, decay=2.8) {
  const len=Math.floor(ctx.sampleRate*dur), buf=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  return buf;
}

function initAudio() {
  if(audioCtx) return;

  bgmGain = audioCtx.createGain(); bgmGain.gain.value=bgmVolume*0.18; bgmGain.connect(audioCtx.destination);

  sfxFilter = audioCtx.createBiquadFilter(); sfxFilter.type='lowpass';
  sfxFilter.frequency.value=1600; sfxFilter.Q.value=0.7;
  // リバーブ: 失敗してもフィルター経由で音が出るよう try-catch
  try {
    sfxReverb = audioCtx.createConvolver(); sfxReverb.buffer=buildImpulse(audioCtx);
    sfxDryGain = audioCtx.createGain(); sfxDryGain.gain.value=0.6;
    sfxWetGain = audioCtx.createGain(); sfxWetGain.gain.value=0.4;
    sfxFilter.connect(sfxDryGain); sfxDryGain.connect(sfxGain);
    sfxFilter.connect(sfxReverb);  sfxReverb.connect(sfxWetGain); sfxWetGain.connect(sfxGain);
  } catch(e) {
    sfxReverb=null;
    sfxFilter.connect(sfxGain); // リバーブ失敗 → フィルターのみ直結
  }
  startBGM();
}

function playTone(freq,type,dur,vol=1,start=0,dest=null) {
  if(!audioCtx||muted) return;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.type=type; osc.frequency.value=freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+start+dur);
  osc.connect(g); g.connect(dest || sfxFilter || sfxGain);
  osc.start(audioCtx.currentTime+start); osc.stop(audioCtx.currentTime+start+dur);
}

const particles=[];

function spawnParticles(x,y,color,count=12) {
  for(let i=0;i<count;i++){
    const a=(Math.PI*2/count)*i+Math.random()*.5, sp=2+Math.random()*4;
    particles.push({
      x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,decay:.02+Math.random()*.03,size:4+Math.random()*6,
      color, shape:Math.random()>.5?'circle':'donut',
    });
  }
}
function spawnLineParticles(row, lines=1) {
  const n=5*lines;
  for(let c=0;c<COLS;c++){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, sp=3+Math.random()*7;
      particles.push({
        x:c*CELL+CELL/2, y:row*CELL+CELL/2,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-3,
        life:1, decay:0.01+Math.random()*.013,
        size:8+Math.random()*12,
        color:`hsl(${Math.random()*360},100%,70%)`,
        shape:Math.random()>.5?'circle':'donut',
      });
    }
  }
}
function spawnDropParticles(x,y) {
  for(let i=0;i<6;i++) particles.push({
    x:x+CELL/2+(Math.random()-.5)*CELL, y:y+CELL/2,
    vx:(Math.random()-.5)*3, vy:-Math.random()*4,
    life:1, decay:.04, size:3+Math.random()*4, color:'#FFD700', shape:'star',
  });
}
function updateParticles() {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.vx*=0.97; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles() {
  pCtx.clearRect(0,0,CW,CH);
  particles.forEach(p=>{
    pCtx.save(); pCtx.globalAlpha=p.life; pCtx.fillStyle=p.color;
    pCtx.translate(p.x,p.y);
    if(p.shape==='donut'){
      pCtx.beginPath(); pCtx.arc(0,0,p.size,0,Math.PI*2); pCtx.arc(0,0,p.size*.4,0,Math.PI*2,true); pCtx.fill();
    } else if(p.shape==='star'){
      drawStar(pCtx,0,0,4,p.size,p.size*.4);
    } else {
      pCtx.beginPath(); pCtx.arc(0,0,p.size,0,Math.PI*2); pCtx.fill();
    }
    pCtx.restore();
  });
}
function drawStar(c,cx,cy,spikes,outerR,innerR){
  let rot=(Math.PI/2)*3, step=Math.PI/spikes;
  c.beginPath(); c.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){
    c.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR); rot+=step;
    c.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR); rot+=step;
  }
  c.lineTo(cx,cy-outerR); c.closePath(); c.fill();
}

function buildLevelBtnsHTML(){

let comLv=1;
let comGrid=[];
let comCurrentPiece=null,comNextData=null;
let comScore=0,comLines_count=0,comLevel=1,comCombo=0;
let comDropTimer=0,comDropInterval=1500,comRunning=false;
let cCtx=null;
let pendingGarbageForPlayer=0,pendingGarbageForCom=0;

function clearLinesOnGrid(g){
  let count=0;
  for(let r=ROWS-1;r>=0;r--){if(g[r].every(c=>c!==null && c!=='G')){g.splice(r,1);g.unshift(Array(COLS).fill(null));count++;r++;}}
  return count;
}
function collidesOnGrid(p,g){
  return p.cells.some(({dx,dy})=>{const nx=p.x+dx,ny=p.y+dy;return nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&g[ny][nx]!==null);});
}
function hardDropOnGrid(p,g){
  let q={...p,cells:p.cells.map(c=>({...c}))};
  while(!collidesOnGrid({...q,y:q.y+1},g))q.y++;
  return q;
}
function addGarbageToGrid(tg,count){for(let i=0;i<count;i++){tg.shift();tg.push(Array(COLS).fill('G'));}}

function comEvalBoard(g){
  const colH=Array(COLS).fill(0);
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(g[r][c]!==null){colH[c]=ROWS-r;break;}
  let holes=0;
  for(let c=0;c<COLS;c++){let inCol=false;for(let r=0;r<ROWS;r++){if(g[r][c]!==null)inCol=true;else if(inCol)holes++;}}
  let rowTrans=0;
  for(let r=0;r<ROWS;r++){let prev=1;for(let c=0;c<COLS;c++){const cur=g[r][c]!==null?1:0;if(cur!==prev)rowTrans++;prev=cur;}if(prev===0)rowTrans++;}
  let colTrans=0;
  for(let c=0;c<COLS;c++){let prev=1;for(let r=ROWS-1;r>=0;r--){const cur=g[r][c]!==null?1:0;if(cur!==prev)colTrans++;prev=cur;}}
  let wells=0;
  for(let c=0;c<COLS;c++){let depth=0;for(let r=0;r<ROWS;r++){if(g[r][c]===null){const lF=c===0||g[r][c-1]!==null,rF=c===COLS-1||g[r][c+1]!==null;if(lF&&rF){depth++;wells+=depth;}else depth=0;}else depth=0;}}
  const aggH=colH.reduce((s,h)=>s+h,0),maxH=Math.max(0,...colH),danger=maxH>12?(maxH-12)*2.5:0;
  return -aggH*.4-maxH*.5-danger-holes*4.0-rowTrans*.8-colTrans*.5-wells*.35;
}
function lineBonus(n){return[0,5,40,100,200][Math.min(n,4)];}

function comAllMoves(piece){
  const results=[],rotations=[piece.cells];
  let cur={...piece,cells:piece.cells.map(c=>({...c}))};
  for(let i=0;i<3;i++){const r=cur.cells.map(({dx,dy})=>({dx:-dy,dy:dx}));rotations.push(r);cur={...cur,cells:r};}
  const seen=new Set();
  rotations.forEach(rCells=>{
    const key=JSON.stringify(rCells);if(seen.has(key))return;seen.add(key);
    for(let x=0;x<COLS;x++){
      const p={...piece,x,cells:rCells};if(collidesOnGrid(p,comGrid))continue;
      const d=hardDropOnGrid(p,comGrid);
      const g=comGrid.map(r=>[...r]);
      rCells.forEach(({dx,dy})=>{const nx=d.x+dx,ny=d.y+dy;if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS)g[ny][nx]=piece.donutIdx??0;});
      const n=clearLinesOnGrid(g);
      results.push({x:d.x,cells:rCells,y:d.y,score:lineBonus(n)+comEvalBoard(g),lines:n});
    }
  });
  return results;
}

function comLockAndProcess(bx,bCells,by){
  bCells.forEach(({dx,dy})=>{const nx=bx+dx,ny=by+dy;if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS)comGrid[ny][nx]=comCurrentPiece.donutIdx??0;});
  const n=clearLinesOnGrid(comGrid);
  if(n>0){ comCombo++; comScore+=[0,100,300,600,1000][Math.min(n,4)]*comLevel*comCombo; pendingGarbageForPlayer+=n; }
  else { comCombo=0; }
  comLines_count+=n;
  const nl=Math.floor(comLines_count/10)+1;if(nl>comLevel)comLevel=nl;
  const scoreEl=document.getElementById('com-score-display');if(scoreEl)scoreEl.textContent=comScore.toLocaleString();
  comCurrentPiece=null;comDropTimer=0;
  const next=comNextData||(()=>{const si=weightedRandom(SHAPE_WEIGHTS);return{shapeIdx:si,donutIdx:SHAPE_DONUT_MAP[si]};})();
  comCurrentPiece={x:Math.floor(COLS/2),y:1,cells:SHAPES[next.shapeIdx].map(([dx,dy])=>({dx,dy})),donutIdx:next.donutIdx,shapeIdx:next.shapeIdx};
  {const si=weightedRandom(SHAPE_WEIGHTS);comNextData={shapeIdx:si,donutIdx:SHAPE_DONUT_MAP[si]};}
  if(collidesOnGrid(comCurrentPiece,comGrid)){comRunning=false;setTimeout(()=>endGame(true),100);return;}
  if(pendingGarbageForCom>0){addGarbageToGrid(comGrid,pendingGarbageForCom);pendingGarbageForCom=0;}
}

function comTick(dt){
  if(!comRunning||!comCurrentPiece)return;
  comDropTimer+=dt;
  if(comDropTimer>=comDropInterval){
    comDropTimer=0;
    const moves=comAllMoves(comCurrentPiece);if(!moves.length)return;
    moves.sort((a,b)=>b.score-a.score);
    // Lv1-7: ベスト手の確率とプール幅で難易度調整 / Lv8-9: 常に最良手（速度差のみ）
    const cfg=[null,
      {prob:0.15,pool:999},{prob:0.30,pool:8},{prob:0.47,pool:6},
      {prob:0.62,pool:5  },{prob:0.75,pool:4},{prob:0.87,pool:3},
      {prob:0.95,pool:2  },{prob:1.00,pool:1},{prob:1.00,pool:1},
    ][comLv];
    let best;
    if(Math.random()<cfg.prob){best=moves[0];}
    else{const pool=moves.slice(0,Math.min(cfg.pool,moves.length));best=pool[Math.floor(Math.random()*pool.length)];}
    if(best)comLockAndProcess(best.x,best.cells,best.y);
    if(pendingGarbageForPlayer>0){addGarbageToGrid(grid,pendingGarbageForPlayer);pendingGarbageForPlayer=0;}
  }
}

function comDrawBoard(){
  if(!cCtx)return;
  const bc=BATTLE_CELL;
  cCtx.clearRect(0,0,BCW,BCH);
  cCtx.strokeStyle='rgba(255,255,255,0.05)';cCtx.lineWidth=1;
  for(let c=0;c<=COLS;c++){cCtx.beginPath();cCtx.moveTo(c*bc,0);cCtx.lineTo(c*bc,BCH);cCtx.stroke();}
  for(let r=0;r<=ROWS;r++){cCtx.beginPath();cCtx.moveTo(0,r*bc);cCtx.lineTo(BCW,r*bc);cCtx.stroke();}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=comGrid[r][c];
    if(cell==='G'){cCtx.fillStyle='rgba(150,150,150,0.7)';cCtx.fillRect(c*bc+1,r*bc+1,bc-2,bc-2);}
    else if(cell!==null){drawDonut(cCtx,c*bc+1,r*bc+1,bc-2,DONUTS[cell],1,gameTime*.05);}
  }
  if(comCurrentPiece){
    const donut=DONUTS[comCurrentPiece.donutIdx];
    const ghost=hardDropOnGrid(comCurrentPiece,comGrid);
    ghost.cells.forEach(({dx,dy})=>{const nx=ghost.x+dx,ny=ghost.y+dy;if(ny>=0){cCtx.save();cCtx.globalAlpha=0.3;cCtx.fillStyle=donut.glaze;cCtx.fillRect(nx*bc+2,ny*bc+2,bc-4,bc-4);cCtx.restore();}});
    comCurrentPiece.cells.forEach(({dx,dy})=>{const nx=comCurrentPiece.x+dx,ny=comCurrentPiece.y+dy;if(ny>=0)drawDonut(cCtx,nx*bc+1,ny*bc+1,bc-2,donut,1,gameTime*.1);});
  }
}

// ════════════════════════════════════════════════════════
// DONUT DRAWING
// ════════════════════════════════════════════════════════
function drawDonut(c,x,y,sz,donut,alpha=1,time=0) {
  // 極小サイズ（バトルボードCOM側など）のみ軽量描画
  if(sz<16){
    c.save(); c.globalAlpha=alpha;
    const cx=x+sz/2, cy=y+sz/2, r=sz*.42, hr=sz*.16;
    c.beginPath(); c.arc(cx,cy,r,0,Math.PI*2); c.arc(cx,cy,hr,0,Math.PI*2,true);
    c.fillStyle=donut.body; c.fill();
    c.strokeStyle=donut.glaze; c.lineWidth=1.5; c.stroke();
    // timeを使って光沢ハイライトを回転させる
    const ha=time*0.8;
    const hx=cx+Math.cos(ha)*r*.38, hy=cy+Math.sin(ha)*r*.38;
    c.beginPath(); c.arc(hx,hy,r*.22,0,Math.PI*2);
    c.fillStyle='rgba(255,255,255,0.45)'; c.fill();
    c.restore(); return;
  }
  c.save(); c.globalAlpha=alpha; c.translate(x+sz/2,y+sz/2);
  const r=sz*.42, hr=sz*.16;

  if(donut.special==='ring'){
    const bumpR=r*.28, bc=8;
    c.beginPath(); c.arc(0,0,r*.72,0,Math.PI*2); c.arc(0,0,r*.38,0,Math.PI*2,true);
    const g=c.createRadialGradient(-r*.2,-r*.2,0,0,0,r);
    g.addColorStop(0,'#FFF8E7'); g.addColorStop(.5,donut.body); g.addColorStop(1,donut.glaze);
    c.fillStyle=g; c.fill();
    for(let i=0;i<bc;i++){
      const a=(Math.PI*2/bc)*i+time*.3, bx=Math.cos(a)*r*.56, by=Math.sin(a)*r*.56;
      const g2=c.createRadialGradient(bx-bumpR*.3,by-bumpR*.3,0,bx,by,bumpR);
      g2.addColorStop(0,'#FFF8E7'); g2.addColorStop(1,donut.body);
      c.beginPath(); c.arc(bx,by,bumpR,0,Math.PI*2); c.fillStyle=g2; c.fill();
    }
  } else if(donut.special==='crinkle'){
    c.beginPath();
    const pts=16;
    for(let i=0;i<=pts;i++){
      const a=(Math.PI*2/pts)*i, rr=r*(1+.1*Math.sin(a*6));
      if(i===0) c.moveTo(Math.cos(a)*rr,Math.sin(a)*rr); else c.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
    }
    c.arc(0,0,hr,0,Math.PI*2,true);
    const g=c.createRadialGradient(-r*.2,-r*.2,0,0,0,r);
    g.addColorStop(0,'#D4A574'); g.addColorStop(.6,donut.body); g.addColorStop(1,donut.glaze);
    c.fillStyle=g; c.fill();
  } else {
    c.beginPath(); c.arc(0,0,r,0,Math.PI*2); c.arc(0,0,hr,0,Math.PI*2,true);
    const g=c.createRadialGradient(-r*.25,-r*.25,hr*.5,0,0,r);
    g.addColorStop(0,'#FFFFFF55'); g.addColorStop(.3,donut.body+'EE'); g.addColorStop(1,donut.glaze+'CC');
    c.fillStyle=g; c.fill();
    c.beginPath(); c.arc(0,-r*.05,r*.75,Math.PI+.5,-.5); c.arc(0,-r*.05,hr*1.1,-.5,Math.PI+.5,true);
    c.fillStyle=donut.glaze+'AA'; c.fill();
  }

  if(donut.sprinkles.length>0){
    for(let i=0;i<8;i++){
      const sa=(Math.PI*2/8)*i+time*.1, sr=hr+(r-hr)*.55+Math.sin(sa*3)*2;
      c.save(); c.translate(Math.cos(sa)*sr,Math.sin(sa)*sr); c.rotate(sa+Math.PI/4);
      c.fillStyle=donut.sprinkles[i%donut.sprinkles.length]; c.fillRect(-3,-1,6,2); c.restore();
    }
  }
  c.beginPath(); c.arc(-r*.2,-r*.3,r*.18,0,Math.PI*2); c.fillStyle='rgba(255,255,255,0.35)'; c.fill();
  c.shadowColor=donut.glaze; c.shadowBlur=8;
  c.beginPath(); c.arc(0,0,r*1.05,0,Math.PI*2); c.arc(0,0,hr*.9,0,Math.PI*2,true);
  c.strokeStyle=donut.glaze+'44'; c.lineWidth=2; c.stroke();
  c.restore();
}

// ════════════════════════════════════════════════════════
// PIECE LOGIC
// ════════════════════════════════════════════════════════
function newPieceData() { const si=weightedRandom(SHAPE_WEIGHTS); return {shapeIdx:si, donutIdx:SHAPE_DONUT_MAP[si]}; }
function createPiece(d) {
  return {x:Math.floor(COLS/2),y:1, cells:SHAPES[d.shapeIdx].map(([dx,dy])=>({dx,dy})), donutIdx:d.donutIdx, shapeIdx:d.shapeIdx, time:0};
}
function collides(p) {
  return p.cells.some(({dx,dy})=>{const nx=p.x+dx,ny=p.y+dy;return nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&grid[ny][nx]!==null);});
}
function rotatePiece(p,dir=1) {
  const rot=p.cells.map(({dx,dy})=>({dx:-dy*dir,dy:dx*dir}));
  for(const kx of [0,-1,1,-2,2]) for(const ky of [0,-1,1]){
    const k={...p,x:p.x+kx,y:p.y+ky,cells:rot};
    if(!collides(k)) return k;
  }
  return p;
}
function hardDrop(p) { let q={...p,cells:[...p.cells]};while(!collides({...q,y:q.y+1}))q.y++;return q; }

function spawnPiece() {
  if(!nextPieceData) nextPieceData=newPieceData();
  currentPiece=createPiece(nextPieceData); nextPieceData=newPieceData(); canHold=true;
  if(collides(currentPiece)) endGame();
}

function lockPiece(p) {
  p.cells.forEach(({dx,dy})=>{const nx=p.x+dx,ny=p.y+dy;if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS)grid[ny][nx]=p.donutIdx;});
  sfxDrop();
  p.cells.forEach(({dx,dy})=>{const nx=p.x+dx,ny=p.y+dy;if(ny>=0)spawnDropParticles(nx*CELL,ny*CELL);});
  if(gameMode==='multi'&&mpPendingGarbage>0){addGarbageToGrid(grid,mpPendingGarbage);mpPendingGarbage=0;}
  checkLines();
  if(gameMode==='multi') mpSendGridState();
  spawnPiece(); checkDanger();
}

function checkLines() {
  const rowsToClear=[];
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(c=>c!==null && c!=='G')) rowsToClear.push(r);
  }
  const count=rowsToClear.length;
  if(count>0){
    rowsToClear.forEach(r=>spawnLineParticles(r,count));
    rowsToClear.forEach(r=>grid.splice(r,1));
    for(let i=0;i<count;i++) grid.unshift(Array(COLS).fill(null));
    sfxLineClear(count);
    haptic('lineClear',{count});
    combo++; if(combo>1){sfxCombo(combo);haptic('combo',{count:combo});}
    shakeTimer=15;
    const earned=[0,100,300,600,1000][Math.min(count,4)]*level*combo;
    score+=earned; lines+=count;
    if(gameMode==='battle') pendingGarbageForCom+=count;
    if(gameMode==='multi') mpBridge('send',{data:{type:'garbage',lines:count}});
    const nl=Math.floor(lines/10)+1;
    if(nl>level){level=nl;dropInterval=Math.max(100,700-(level-1)*60);sfxLevelUp();}
    if(combo>1) showCombo(combo);
    updateUI();
  } else { combo=0; }
  const cb=document.getElementById('combo-display-box');
  if(cb) cb.textContent=combo>0?combo+'x':'0x';
}

// ════════════════════════════════════════════════════════
// HOLD
// ════════════════════════════════════════════════════════
function holdPiece() {
  if(!canHold) return;
  sfxHold(); canHold=false;
  if(!holdPieceData){holdPieceData={shapeIdx:currentPiece.shapeIdx,donutIdx:currentPiece.donutIdx};spawnPiece();}
  else{const t=holdPieceData;holdPieceData={shapeIdx:currentPiece.shapeIdx,donutIdx:currentPiece.donutIdx};currentPiece=createPiece(t);}
  drawHold();
}

// ════════════════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════════════════
function drawGrid() {
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,CH);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(CW,r*CELL);ctx.stroke();}
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=grid[r][c];
    if(cell===null) continue;
    if(cell==='G'){
      ctx.fillStyle='rgba(150,150,150,0.7)';
      ctx.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
    } else {
      drawDonut(ctx,c*CELL+1,r*CELL+1,CELL-2,DONUTS[cell],1,gameTime*.05);
    }
  }
}

function drawCurrentPiece() {
  if(!currentPiece) return;
  const ghost=hardDrop(currentPiece), donut=DONUTS[currentPiece.donutIdx];
  ghost.cells.forEach(({dx,dy})=>{
    const nx=ghost.x+dx,ny=ghost.y+dy;
    if(ny>=0){ctx.save();ctx.globalAlpha=0.2;ctx.beginPath();
      ctx.arc(nx*CELL+CELL/2,ny*CELL+CELL/2,CELL*.38,0,Math.PI*2);
      ctx.arc(nx*CELL+CELL/2,ny*CELL+CELL/2,CELL*.14,0,Math.PI*2,true);
      ctx.strokeStyle=donut.glaze;ctx.lineWidth=2;ctx.stroke();ctx.restore();}
  });
  currentPiece.cells.forEach(({dx,dy})=>{
    const nx=currentPiece.x+dx,ny=currentPiece.y+dy;
    if(ny>=0) drawDonut(ctx,nx*CELL+1,ny*CELL+1,CELL-2,donut,1,gameTime*.1);
  });
}

function drawNext() {
  const NW=nextCanvas.width, NH=nextCanvas.height;
  nextCtx.clearRect(0,0,NW,NH);
  if(!nextPieceData) return;
  const donut=DONUTS[nextPieceData.donutIdx], cells=SHAPES[nextPieceData.shapeIdx];
  const minX=Math.min(...cells.map(([dx])=>dx)), maxX=Math.max(...cells.map(([dx])=>dx));
  const minY=Math.min(...cells.map(([,dy])=>dy)), maxY=Math.max(...cells.map(([,dy])=>dy));
  const sc=Math.min(NW*0.2, (NW-10)/Math.max(maxX-minX+1,maxY-minY+1));
  const ox=NW/2-((minX+maxX)/2)*sc, oy=NH/2-((minY+maxY)/2)*sc;
  cells.forEach(([dx,dy])=>drawDonut(nextCtx,ox+dx*sc-sc/2+1,oy+dy*sc-sc/2+1,sc-2,donut,1,gameTime*.1));
}

function drawHold() {
  const HW=holdCanvas.width, HH=holdCanvas.height;
  holdCtx.clearRect(0,0,HW,HH);
  if(!holdPieceData) return;
  const donut=DONUTS[holdPieceData.donutIdx], cells=SHAPES[holdPieceData.shapeIdx];
  const minX=Math.min(...cells.map(([dx])=>dx)), maxX=Math.max(...cells.map(([dx])=>dx));
  const minY=Math.min(...cells.map(([,dy])=>dy)), maxY=Math.max(...cells.map(([,dy])=>dy));
  const sc=Math.min(HH*0.4, (Math.min(HW,HH)-8)/Math.max(maxX-minX+1,maxY-minY+1));
  const ox=HW/2-((minX+maxX)/2)*sc, oy=HH/2-((minY+maxY)/2)*sc;
  holdCtx.globalAlpha=canHold?1:.4;
  cells.forEach(([dx,dy])=>drawDonut(holdCtx,ox+dx*sc-sc/2+1,oy+dy*sc-sc/2+1,sc-2,donut,1,gameTime*.1));
}

// ════════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════════
function gameLoop(ts) {
  if(!gameRunning) return;
  const dt=ts-lastTime; lastTime=ts; gameTime++;
  drawBg();
  ctx.clearRect(0,0,CW,CH); ctx.save();
  if(!gamePaused){
    if(shakeTimer>0){const a=shakeTimer*.5;ctx.translate((Math.random()-.5)*a,(Math.random()-.5)*a);shakeTimer--;}
    if(currentPiece) currentPiece.time++;
    dropTimer+=dt;
    if(dropTimer>=dropInterval){
      dropTimer=0;
      if(currentPiece){const m={...currentPiece,y:currentPiece.y+1};if(!collides(m))currentPiece=m;else lockPiece(currentPiece);}
    }
  }
  drawGrid(); drawCurrentPiece(); ctx.restore();
  updateParticles(); drawParticles(); drawNext();
  if(gameMode==='battle'&&comRunning&&!gamePaused){comTick(dt);comDrawBoard();}
  requestAnimationFrame(gameLoop);
}

let tx0=0,ty0=0,txL=0,tMoved=false;
const touchTarget=document.getElementById('game-area');
touchTarget.addEventListener('touchstart',e=>{
  if(!gameRunning||gamePaused)return;
  const t=e.touches[0]; tx0=txL=t.clientX; ty0=t.clientY; tMoved=false;
},{passive:true});
touchTarget.addEventListener('touchmove',e=>{
  if(!gameRunning||gamePaused||!currentPiece)return;
  e.preventDefault();
  const t=e.touches[0],dx=t.clientX-txL,dy=t.clientY-ty0;
  if(Math.abs(t.clientX-tx0)>12||Math.abs(dy)>12) tMoved=true;
  if(Math.abs(dx)>CELL*.8){
    const dir=dx>0?1:-1, m={...currentPiece,x:currentPiece.x+dir};
    if(!collides(m)){currentPiece=m;sfxMove();} txL=t.clientX;
  }
  if(dy>30) dropTimer=dropInterval;
},{passive:false});
touchTarget.addEventListener('touchend',e=>{
  if(!gameRunning||gamePaused||!currentPiece)return;
  if(!tMoved){currentPiece=rotatePiece(currentPiece,1);sfxRotate();}
  const sy=e.changedTouches[0].clientY-ty0;
  if(sy>70){const d=hardDrop(currentPiece);score+=(d.y-currentPiece.y)*2;currentPiece=d;lockPiece(currentPiece);updateUI();}
},{passive:true});

const _btnStopFns=[];
function btnPress(id,fn) {
  const btn=document.getElementById(id); if(!btn)return;
  let iv=null;
  const start=()=>{fn();iv=setInterval(fn,150);btn.classList.add('active');};
  const stop=()=>{clearInterval(iv);iv=null;btn.classList.remove('active');};
  _btnStopFns.push(stop);
  btn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();start();},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();stop();},{passive:false});
  btn.addEventListener('touchcancel',()=>stop(),{passive:false});
  btn.addEventListener('mousedown',()=>{initAudio();start();});
  ['mouseup','mouseleave'].forEach(ev=>btn.addEventListener(ev,stop));
}
function btnTap(id,fn) {
  const btn=document.getElementById(id); if(!btn)return;
  const stopActive=()=>btn.classList.remove('active');
  _btnStopFns.push(stopActive);
  btn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();fn();btn.classList.add('active');},{passive:false});
  btn.addEventListener('touchend',e=>{e.preventDefault();stopActive();},{passive:false});
  btn.addEventListener('touchcancel',()=>stopActive(),{passive:false});
  btn.addEventListener('click',()=>{initAudio();fn();});
}

function startGame() {
  initAudio();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) grid[r][c]=null;
  particles.length=0;
  score=0;lines=0;level=1;combo=0;dropInterval=700;dropTimer=0;gameTime=0;
  currentPiece=null;nextPieceData=null;holdPieceData=null;canHold=true;gamePaused=false;shakeTimer=0;
  holdCtx.clearRect(0,0,holdCanvas.width,holdCanvas.height);
  updateUI();
  document.getElementById('overlay').style.display='none';
  gameRunning=true; spawnPiece(); nextPieceData=newPieceData();
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function endGame(playerWon=false) {
  gameRunning=false; comRunning=false;
  if(score>hiScore){hiScore=score;localStorage.setItem('donutHiScore',hiScore);}
  if(gameMode==='multi'){
    mpOnPlayerGameOver();
  } else if(gameMode==='battle'){
    const won=playerWon;
    const newUnlock=won?tryUnlockNextLv(comLv):false;
    if(won){
      // 最高撃破LvをGame Centerに登録
      const hiBeatenLv=parseInt(localStorage.getItem('donutHiBeatenLv')||'0');
      if(comLv>hiBeatenLv){localStorage.setItem('donutHiBeatenLv',comLv);reportToGameCenter('jp.donutdrop.battlelv',comLv);}
    }
    if(won) sfxLevelUp(); else sfxGameOver();
    haptic(won?'levelUp':'gameOver');
    setTimeout(()=>{
      const unlockMsg=newUnlock?`<br><span style="color:#00f5d4;font-size:0.82em;">🔓 Lv.${comLv+1} が解放されました！</span>`:(won&&comLv===9?`<br><span style="color:#ffcc00;font-size:0.82em;">👑 全レベル制覇！</span>`:'');
      document.getElementById('battle-result-title').textContent=won?'🏆 YOU WIN!':'😭 GAME OVER...';
      document.getElementById('battle-result-sub').innerHTML=won
        ?`${COM_INFO[comLv].emoji} ${COM_INFO[comLv].name} に勝った！<br>あなたのスコア: <b style="color:#ffcc00;font-size:1.4em">${score.toLocaleString()}</b><br>COMのスコア: ${comScore.toLocaleString()}${unlockMsg}`
        :`${COM_INFO[comLv].emoji} ${COM_INFO[comLv].name} に負けた…<br>あなたのスコア: <b style="color:#ffcc00;font-size:1.4em">${score.toLocaleString()}</b><br>COMのスコア: ${comScore.toLocaleString()}`;
      const nextBtn=document.getElementById('battle-result-next');
      if(nextBtn){
        const nextLv=comLv+1;
        if(won && nextLv<=9 && nextLv<=getUnlockedLv()){
          nextBtn.textContent=`⚔️ 次の Lv.${nextLv} ${COM_INFO[nextLv].emoji}${COM_INFO[nextLv].name} へチャレンジ！`;
          nextBtn.style.display='';
        } else { nextBtn.style.display='none'; }
      }
      document.getElementById('battle-result').style.display='flex';
    },800);
  } else {
    sfxGameOver();
    setTimeout(()=>{
      const ov=document.getElementById('overlay');
      ov.style.display='flex';
      ov.innerHTML=`
        <h1>🍩 GAME OVER!</h1>
        <div class="sub">
          スコア: <b style="color:#ffcc00;font-size:1.4em">${score.toLocaleString()}</b><br>
          ハイスコア: ${hiScore.toLocaleString()}<br>
          スピード ${level} / ${lines}ライン
        </div>
        <button class="btn" id="start-btn">🔄 もう一度！</button>
        <button class="btn-back-lv" id="btn-top">🏠 トップへもどる</button>
      `;
      document.getElementById('start-btn').addEventListener('click',startGame);
      document.getElementById('btn-top').addEventListener('click',resetToTop);
    },800);
  }
}

function resetToTop(){
  clearInterval(mpDotTimer);mpDotTimer=null;
  if(gameMode==='multi'){mpBridge('cancelLobby');document.getElementById('mp-opponent-canvas')?.remove();}
  mpOpponentName='';mpOpponentGrid=null;mpPendingGarbage=0;mpGameOverSent=false;
  gameRunning=false;comRunning=false;gameMode='solo';cCtx=null;
  {const _tH=document.getElementById('topbar')?.getBoundingClientRect().height||topH;
   const _cH=document.getElementById('controls')?.getBoundingClientRect().height||ctrlH;
   CELL=Math.max(20,Math.min(Math.floor((window.innerHeight-_tH-_cH-10)/ROWS),Math.floor((window.innerWidth-sideW-12)/COLS),32));}
  CW=COLS*CELL;CH=ROWS*CELL;
  gameCanvas.width=CW;gameCanvas.height=CH;
  pCanvas.width=CW;pCanvas.height=CH;
  const topbar=document.getElementById('topbar');
  if(topbar) topbar.innerHTML=`<div id="title-top">🍩 <span>DONUT DROP</span> 🍩</div>`;
  const comArea=document.getElementById('com-board-area');if(comArea)comArea.remove();
  document.getElementById('battle-vs-el')?.remove();
  const gameArea=document.getElementById('game-area');
  if(gameArea) gameArea.classList.remove('battle-mode');
  // battle-nh-rowを削除してNEXT/HOLDをmini-boxに戻す
  const nhRow=document.getElementById('battle-nh-row');
  const nextEl=document.getElementById('next-canvas');
  const holdEl=document.getElementById('hold-canvas');
  if(nhRow){
    document.querySelectorAll('.mini-box').forEach(el=>{
      const lbl=el.querySelector('.lbl');
      if(lbl&&lbl.textContent==='NEXT'&&nextEl) el.appendChild(nextEl);
      if(lbl&&lbl.textContent==='HOLD'&&holdEl) el.appendChild(holdEl);
    });
    nhRow.remove();
    NEXT_SIZE=54; nextEl.width=NEXT_SIZE; nextEl.height=NEXT_SIZE;
    HOLD_W=54; HOLD_H=44; holdEl.width=HOLD_W; holdEl.height=HOLD_H;
  }
  // battle-player-colをアンラップしてキャンバスをgameAreaに戻す
  const playerCol=document.getElementById('battle-player-col');
  if(playerCol&&gameArea){
    const canvasWr=gameCanvas.parentElement;
    gameArea.insertBefore(canvasWr,playerCol);
    playerCol.remove();
  }
  // side-miniを元の位置（game-area内）に戻す
  const sideMini=document.querySelector('.side-mini');
  if(sideMini&&gameArea){
    gameArea.insertBefore(sideMini,gameArea.firstChild);
    sideMini.style.cssText='';
  }
  document.querySelectorAll('.mini-box').forEach(el=>{
    el.style.display=''; el.style.flex=''; el.style.padding='';
    const v=el.querySelector('.val'); if(v) v.style.fontSize='';
    el.querySelectorAll('a').forEach(a=>a.style.display='');
    el.querySelectorAll('.menu-icon-btn').forEach(b=>{b.style.fontSize='';b.style.width='';b.style.height='';});
  });
  document.getElementById('battle-result').style.display='none';
  // DOM更新後にsolo layoutのgame-area高さでCELLを再確定
  requestAnimationFrame(() => { recalcCanvasSize(false); });
  showTopOverlay();
}

function showTopOverlay(){
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <h1>🍩<br>DONUT DROP</h1>
    <div id="mode-select" class="mode-select-btns">
      <div class="sub" style="margin-bottom:14px;font-size:12px;">ドーナツを並べてラインを消そう！</div>

      <button class="btn-battle-mode" id="btn-battle-mode">⚔️ COMと対戦！</button>
      <button class="btn-mp-mode" id="btn-mp-mode">🌐 マルチプレイ対戦</button>
    </div>
    <div id="com-select" style="display:none;width:min(300px,88vw);flex-direction:column;align-items:center;">

function bindModeSelectEvents(){
  const btnBattle=document.getElementById('btn-battle-mode');
  const btnBack=document.getElementById('back-to-mode');
  const btnSolo=document.getElementById('start-btn');
  const btnMp=document.getElementById('btn-mp-mode');
  if(btnSolo) btnSolo.addEventListener('click',startGame);
  if(btnMp) btnMp.addEventListener('click',()=>{ initAudio(); showMpLobby(); });
  if(btnBattle) btnBattle.addEventListener('click',()=>{
    initAudio();
    const grid=document.getElementById('com-level-grid');
    if(grid) grid.innerHTML=buildLevelBtnsHTML();
    document.getElementById('mode-select').style.display='none';
    document.getElementById('com-select').style.display='flex';
  });
  if(btnBack) btnBack.addEventListener('click',()=>{
    document.getElementById('com-select').style.display='none';
    document.getElementById('mode-select').style.display='flex';
  });
  const lvGrid=document.getElementById('com-level-grid');
  if(lvGrid) lvGrid.addEventListener('click',e=>{
    const btn=e.target.closest('[data-lv]');
    if(!btn) return;
    startBattleMode(parseInt(btn.dataset.lv));
  });
}

function startBattleMode(lv){
  initAudio();
  gameMode='battle';comLv=lv;
  comGrid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  comScore=0;comLines_count=0;comLevel=1;comCombo=0;comDropTimer=0;
  comDropInterval=COM_INFO[lv].interval;comRunning=true;
  pendingGarbageForPlayer=0;pendingGarbageForCom=0;
  {const si=weightedRandom(SHAPE_WEIGHTS);comNextData={shapeIdx:si,donutIdx:SHAPE_DONUT_MAP[si]};}
  comCurrentPiece={x:Math.floor(COLS/2),y:1,cells:SHAPES[comNextData.shapeIdx].map(([dx,dy])=>({dx,dy})),donutIdx:comNextData.donutIdx,shapeIdx:comNextData.shapeIdx};
  {const si=weightedRandom(SHAPE_WEIGHTS);comNextData={shapeIdx:si,donutIdx:SHAPE_DONUT_MAP[si]};}

  // プレイヤーボードを対戦サイズに縮小
  CELL=BATTLE_CELL;CW=BCW;CH=BCH;
  gameCanvas.width=CW;gameCanvas.height=CH;
  pCanvas.width=CW;pCanvas.height=CH;

  // トップバーを対戦用に変更
  const topbar=document.getElementById('topbar');
  if(topbar) topbar.innerHTML=`
    <div class="battle-topbar">
      <div class="battle-stat">
        <span class="battle-lbl">YOU</span>
        <span class="battle-val" id="score-display">0</span>
      </div>
      <div class="battle-vs">VS</div>
      <div class="battle-stat">
        <span class="battle-lbl">${COM_INFO[lv].emoji} Lv${lv} ${COM_INFO[lv].name}</span>
        <span class="battle-val" id="com-score-display">0</span>
      </div>
    </div>`;
  // 各stat幅をキャンバス幅に合わせてセンタリング
  const stats=topbar.querySelectorAll('.battle-stat');
  if(stats[0]) stats[0].style.width=CW+'px';
  if(stats[1]) stats[1].style.width=BCW+'px';

  // side-miniを画面下部（controls上）に移動して横並びに
  const sideMini=document.querySelector('.side-mini');
  const controls=document.getElementById('controls');
  if(sideMini&&controls){
    app.insertBefore(sideMini,controls);
    sideMini.style.cssText='flex-direction:row;justify-content:space-around;align-items:stretch;width:100%;padding:2px 8px;flex-shrink:0;gap:8px;box-sizing:border-box;';
    // BEST(HI-SCORE)とMENUのみ表示、他は非表示
    document.querySelectorAll('.mini-box').forEach(el=>{
      const lbl=el.querySelector('.lbl');
      const hide=lbl&&['SCORE','NEXT','HOLD','LINES'].includes(lbl.textContent);
      el.style.display=hide?'none':'';
      if(!hide){
        el.style.flex='1';
        el.style.padding='8px 6px';
        const v=el.querySelector('.val'); if(v) v.style.fontSize='16px';
        // MENUのヘルプ/サポートを非表示、アイコンを大きく
        const lbl2=el.querySelector('.lbl');
        if(lbl2&&lbl2.textContent==='MENU'){
          el.querySelectorAll('a').forEach(a=>a.style.display='none');
          el.querySelectorAll('.menu-icon-btn').forEach(b=>{b.style.fontSize='26px';b.style.width='48px';b.style.height='48px';});
        }
      }
    });
  }

  // NEXT/HOLDをキャンバスの下（game-area外・side-miniの直前）に配置
  const nextEl=document.getElementById('next-canvas');
  const holdEl=document.getElementById('hold-canvas');
  const battleNS=46; const battleHW=46; const battleHH=38;
  nextEl.width=battleNS; nextEl.height=battleNS;
  holdEl.width=battleHW; holdEl.height=battleHH;
  const canvasWrapper=gameCanvas.parentElement;
  const playerCol=document.createElement('div');
  playerCol.id='battle-player-col';
  playerCol.style.cssText='display:flex;flex-direction:column;align-items:center;gap:0;flex-shrink:0;';
  playerCol.appendChild(canvasWrapper);
  const nhRow=document.createElement('div');
  nhRow.id='battle-nh-row';
  const mkNH=(lbl,cvs)=>{
    const d=document.createElement('div');
    d.style.cssText='flex:1;text-align:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,107,205,0.25);border-radius:6px;padding:3px 2px;';
    const l=document.createElement('div');
    l.style.cssText='font-size:7px;color:var(--accent3);letter-spacing:1px;margin-bottom:1px;';
    l.textContent=lbl; d.appendChild(l); d.appendChild(cvs); return d;
  };
  nhRow.appendChild(mkNH('NEXT',nextEl));
  nhRow.appendChild(mkNH('HOLD',holdEl));

  // 前回の対戦レイアウトを完全クリーンアップ（リトライ時の空divが残るとgapでずれる）
  const oldPC=document.getElementById('battle-player-col');
  if(oldPC){ const cw=gameCanvas.parentElement; if(oldPC.contains(cw)&&oldPC.parentElement) oldPC.parentElement.insertBefore(cw,oldPC); oldPC.remove(); }
  const old=document.getElementById('com-board-area');if(old)old.remove();
  document.getElementById('battle-vs-el')?.remove();
  document.getElementById('battle-nh-row')?.remove();
  const gameArea=document.getElementById('game-area');
  if(gameArea){
    gameArea.classList.add('battle-mode');
    gameArea.insertBefore(playerCol,gameArea.firstChild);
    // nhRowをgame-areaの直後（side-miniの直前）に挿入
    nhRow.style.cssText='display:flex;gap:6px;padding:3px 4px 0;flex-shrink:0;box-sizing:border-box;width:'+(BCW)+'px;';
    gameArea.parentElement.insertBefore(nhRow,gameArea.nextSibling);
    const comDiv=document.createElement('div');
    comDiv.id='com-board-area';
    comDiv.style.cssText='position:relative;flex-shrink:0;';
    const comCvs=document.createElement('canvas');
    comCvs.id='com-canvas';comCvs.width=BCW;comCvs.height=BCH;
    comDiv.appendChild(comCvs);
    gameArea.appendChild(comDiv);
    cCtx=comCvs.getContext('2d');
  }

  // ゲーム開始
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c]=null;
  particles.length=0;
  score=0;lines=0;level=1;combo=0;dropInterval=700;dropTimer=0;gameTime=0;
  currentPiece=null;nextPieceData=null;holdPieceData=null;canHold=true;gamePaused=false;shakeTimer=0;
  updateUI();
  document.getElementById('overlay').style.display='none';
  gameRunning=true;spawnPiece();nextPieceData=newPieceData();
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function showMpLobby() {
  gameMode='multi';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <h1 style="font-size:22px;white-space:nowrap;margin-bottom:36px;">🌐 マルチプレイ対戦</h1>
    <div class="sub" style="font-size:11px;">近くのiPhoneを探しています<span id="mp-dots" style="display:inline-block;width:2.5em;text-align:left;">.</span></div>
    <div id="mp-peer-list" style="width:min(280px,85vw);margin-bottom:10px;display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;"></div>
    <div id="mp-status" style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:12px;">見つかったプレイヤーをタップして<br>対戦リクエストを送ろう</div>
    <button class="btn-back-lv" id="mp-cancel-btn">← キャンセル</button>
  `;
  document.getElementById('mp-cancel-btn').addEventListener('click',()=>{ mpBridge('cancelLobby'); resetToTop(); });
  mpBridge('startLobby');
  // 点滅アニメ: . → .. → ... → .... → ..... → くり返し
  clearInterval(mpDotTimer);
  let _dc=1;
  mpDotTimer=setInterval(()=>{
    const el=document.getElementById('mp-dots');
    if(!el){clearInterval(mpDotTimer);mpDotTimer=null;return;}
    el.textContent='.'.repeat(_dc);
    _dc=_dc>=5?1:_dc+1;
  },400);
}

function mpAddPeerToList(peerId, name) {
  const list=document.getElementById('mp-peer-list'); if(!list) return;
  if(document.getElementById('mp-peer-'+peerId)) return;
  const btn=document.createElement('button');
  btn.id='mp-peer-'+peerId; btn.className='mp-peer-btn';
  btn.textContent='👤 '+name;
  btn.addEventListener('click',()=>{
    btn.textContent='⏳ リクエスト送信中...'; btn.disabled=true;
    mpBridge('invite',{peerId});
  });
  list.appendChild(btn);
}

function mpRemovePeerFromList(peerId) {
  document.getElementById('mp-peer-'+peerId)?.remove();
}

function mpShowInviteDialog(name, peerId) {
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <h1 style="font-size:1.1rem;">🎮 対戦リクエスト</h1>
    <div class="sub" style="margin-bottom:16px;"><b>${name}</b> から対戦リクエストが来た！</div>
    <div style="display:flex;gap:10px;">
      <button class="btn" id="mp-accept-btn">✅ 受ける！</button>
      <button class="btn-back-lv" id="mp-decline-btn">断る</button>
    </div>
  `;
  document.getElementById('mp-accept-btn').addEventListener('click',()=>{ mpOpponentName=name; mpBridge('acceptInvite'); });
  document.getElementById('mp-decline-btn').addEventListener('click',()=>{ mpBridge('declineInvite'); resetToTop(); });
}

function mpOnConnected() {
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <div style="text-align:center;">
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:8px;">vs ${mpOpponentName}</div>
      <div id="mp-countdown" style="font-family:'Fredoka One',cursive;font-size:5rem;color:#ffcc00;text-shadow:0 0 30px #ffcc00aa;line-height:1;">5</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:8px;">対戦開始まで…</div>
    </div>
  `;
  let count=5;
  const iv=setInterval(()=>{
    count--;
    const el=document.getElementById('mp-countdown');
    if(el) el.textContent=count>0?count:'GO!';
    if(count<=0){ clearInterval(iv); setTimeout(startMultiplayerGame,500); }
  },1000);
}

function startMultiplayerGame() {
  gameMode='multi'; mpGameOverSent=false; mpOpponentGrid=null; mpPendingGarbage=0;
  const topbar=document.getElementById('topbar');
  if(topbar) topbar.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:0 4px;box-sizing:border-box;">
      <span style="font-family:'Fredoka One',cursive;font-size:13px;color:#ffcc00;">YOU</span>
      <span style="font-size:10px;color:rgba(255,255,255,0.4);">VS</span>
      <span style="font-family:'Fredoka One',cursive;font-size:13px;color:var(--accent);">${mpOpponentName}</span>
    </div>`;
  startGame();
  // 対戦相手プレビューキャンバスをゲーム開始後にセットアップ
  setTimeout(()=>{
    const canvas=mpSetupOpponentCanvas();
    if(canvas) canvas.getContext('2d');
  },100);
}

function mpSetupOpponentCanvas() {
  document.getElementById('mp-opponent-canvas')?.remove();
  const canvas=document.createElement('canvas');
  canvas.id='mp-opponent-canvas';
  const pw=Math.floor(CW/5), ph=Math.floor(CH/5);
  canvas.width=pw; canvas.height=ph;
  canvas.style.cssText='position:absolute;top:4px;right:4px;opacity:0.5;border-radius:3px;border:1px solid rgba(255,255,255,0.25);pointer-events:none;z-index:10;';
  const wrapper=gameCanvas.parentElement;
  if(wrapper) wrapper.appendChild(canvas);
  return canvas;
}

function mpSendGridState() {
  const compact=grid.map(row=>row.map(c=>c===null?null:c==='G'?-1:c));
  mpBridge('sendUnreliable',{data:{type:'gridState',grid:compact}});
}

function mpDrawOpponentPreview() {
  const canvas=document.getElementById('mp-opponent-canvas');
  if(!canvas||!mpOpponentGrid) return;
  const ctx2=canvas.getContext('2d');
  const pw=canvas.width, ph=canvas.height, pc=pw/COLS;
  ctx2.clearRect(0,0,pw,ph);
  ctx2.fillStyle='rgba(0,0,0,0.55)'; ctx2.fillRect(0,0,pw,ph);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const cell=mpOpponentGrid[r][c];
      if(cell===null) continue;
      ctx2.fillStyle=cell===-1?'rgba(150,150,150,0.7)':(DONUTS[cell]?.body||'#888');
      ctx2.fillRect(c*pc+0.5, r*pc+0.5, pc-1, pc-1);
    }
  }
  ctx2.fillStyle='rgba(255,255,255,0.45)';
  ctx2.font=`${Math.max(6,Math.floor(pc*1.5))}px 'Fredoka One',cursive`;
  ctx2.textAlign='center'; ctx2.fillText(mpOpponentName||'相手',pw/2,ph-1);
}

function mpHandleData(data) {
  switch(data.type){
    case 'garbage':
      if(gameRunning&&gameMode==='multi') mpPendingGarbage+=(data.lines||0);
      break;
    case 'gridState':
      mpOpponentGrid=data.grid;
      mpDrawOpponentPreview();
      break;
    case 'gameOver':
      mpOpponentDied(data.score);
      break;
  }
}

function mpOnPlayerGameOver() {
  if(mpGameOverSent) return;
  mpGameOverSent=true;
  sfxGameOver(); haptic('gameOver');
  mpBridge('send',{data:{type:'gameOver',score:score}});
  setTimeout(()=>showMpResult(false, null), 800);
}

function mpOpponentDied(opponentScore) {
  if(!gameRunning||gameMode!=='multi') return;
  if(mpGameOverSent) return; // 引き分け：どちらも既に負けている
  gameRunning=false;
  sfxLevelUp(); haptic('levelUp');
  const v=parseInt(localStorage.getItem('donutVictories')||'0')+1;
  localStorage.setItem('donutVictories',v);
  reportToGameCenter('jp.donutdrop.wins', v);
  setTimeout(()=>showMpResult(true, opponentScore), 800);
}

function showMpResult(won, opponentScore) {
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  if(won){
    ov.innerHTML=`
      <h1>🏆 YOU WIN!</h1>
      <div class="sub">
        ${mpOpponentName} に勝った！<br>
        あなたのスコア: <b style="color:#ffcc00;font-size:1.4em">${score.toLocaleString()}</b><br>
        相手のスコア: ${(opponentScore||0).toLocaleString()}
      </div>
      <button class="btn" id="mp-retry-btn">🌐 もう一度対戦</button>
      <button class="btn-back-lv" id="mp-menu-btn">🏠 トップへもどる</button>
    `;
  } else {
    ov.innerHTML=`
      <h1>😭 GAME OVER...</h1>
      <div class="sub">
        ${mpOpponentName} に負けた…<br>
        あなたのスコア: <b style="color:#ffcc00;font-size:1.4em">${score.toLocaleString()}</b>
      </div>
      <button class="btn" id="mp-retry-btn">🌐 もう一度対戦</button>
      <button class="btn-back-lv" id="mp-menu-btn">🏠 トップへもどる</button>
    `;
  }
  document.getElementById('mp-retry-btn')?.addEventListener('click',()=>{
    mpBridge('disconnect');
    document.getElementById('mp-opponent-canvas')?.remove();
    mpOpponentName='';mpOpponentGrid=null;mpPendingGarbage=0;mpGameOverSent=false;
    gameMode='multi';
    showMpLobby();
  });
  document.getElementById('mp-menu-btn')?.addEventListener('click',()=>{
    mpBridge('disconnect');
    document.getElementById('mp-opponent-canvas')?.remove();
    resetToTop();
  });
}

function mpOnDisconnected() {
  if(!gameRunning||gameMode!=='multi') return;
  gameRunning=false;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML=`
    <h1>📡 接続が切れた</h1>
    <div class="sub">相手との接続が切れました。<br>引き分けです。</div>
    <button class="btn-back-lv" id="mp-back-btn">🏠 トップへもどる</button>
  `;
  document.getElementById('mp-back-btn')?.addEventListener('click',()=>{
    document.getElementById('mp-opponent-canvas')?.remove();
    resetToTop();
  });
}

// 初期レベルグリッドを描画
const _initGrid=document.getElementById('com-level-grid');
if(_initGrid) _initGrid.innerHTML=buildLevelBtnsHTML();

// 対戦結果ボタン
document.getElementById('battle-result-retry')?.addEventListener('click',()=>{

  startBattleMode(comLv);

document.getElementById('battle-result-next')?.addEventListener('click',()=>{

  startBattleMode(comLv+1);
});
document.getElementById('battle-result-menu')?.addEventListener('click',()=>{
  document.getElementById('battle-result').style.display='none';
  resetToTop();
});

bindModeSelectEvents();

(function bgLoop(){drawBg();requestAnimationFrame(bgLoop);})();
</script>
