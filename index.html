<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DONUT DROP 🍩</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Kosugi+Maru&display=swap');

:root {
  --bg: #0a0015;
  --accent: #ff6bcd;
  --accent2: #ffcc00;
  --accent3: #00f5d4;
  --text: #fff5ff;
  --glow-pink: 0 0 20px #ff6bcd88, 0 0 40px #ff6bcd44;
  --glow-yellow: 0 0 20px #ffcc0088, 0 0 40px #ffcc0044;
  --glow-cyan: 0 0 20px #00f5d488, 0 0 40px #00f5d444;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Fredoka One', 'Kosugi Maru', cursive;
  color: var(--text);
  overflow: hidden;
  touch-action: none;
  user-select: none;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, #2a004488 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, #00223388 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, #330044aa 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

#bg-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.4; pointer-events: none; }

.scanlines {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 50;
}

/* ── Shared overlay / button ── */
#overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,10,0.88);
  border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; backdrop-filter: blur(6px); gap: 18px;
}
#overlay h1 {
  font-size: 34px; text-align: center; line-height: 1.2;
  color: var(--accent); text-shadow: var(--glow-pink);
  animation: overlayGlow 2s ease-in-out infinite;
}
@keyframes overlayGlow {
  0%,100%{text-shadow:var(--glow-pink);}
  50%{text-shadow:0 0 40px #ff6bcd,0 0 80px #ff6bcd88;}
}
#overlay .sub {
  font-size: 13px; color: rgba(255,255,255,0.5);
  text-align: center; line-height: 1.7;
  font-family: 'Kosugi Maru', sans-serif;
}
.btn {
  background: linear-gradient(135deg, var(--accent), #cc44aa);
  border: none; border-radius: 50px; padding: 13px 38px;
  font-family: 'Fredoka One', cursive; font-size: 19px;
  color: white; cursor: pointer;
  box-shadow: 0 0 20px rgba(255,107,205,0.5), 0 4px 20px rgba(0,0,0,0.4);
  transition: all 0.2s; letter-spacing: 1px;
  animation: btnPop 1.5s ease-in-out infinite;
}
.btn:hover { transform: scale(1.07); animation: none; }
.btn:active { transform: scale(0.97); }
@keyframes btnPop { 0%,100%{transform:scale(1);} 50%{transform:scale(1.03);} }

.btn-secondary {
  background: linear-gradient(135deg, #4a4aaa, #2a2a88);
  border: none; border-radius: 50px; padding: 13px 38px;
  font-family: 'Fredoka One', cursive; font-size: 19px;
  color: white; cursor: pointer;
  box-shadow: 0 0 20px rgba(100,100,255,0.4), 0 4px 20px rgba(0,0,0,0.4);
  transition: all 0.2s; letter-spacing: 1px;
  animation: btnPop 1.5s ease-in-out infinite;
}
.btn-secondary:hover { transform: scale(1.07); animation: none; }
.btn-secondary:active { transform: scale(0.97); }

.btn-row { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* COM level selection */
.com-level-btn {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,107,205,0.4);
  border-radius: 16px; padding: 14px 20px;
  font-family: 'Fredoka One', cursive; font-size: 15px;
  color: white; cursor: pointer; text-align: center;
  transition: all 0.2s; min-width: 130px;
}
.com-level-btn:hover {
  background: rgba(255,107,205,0.15);
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(255,107,205,0.5);
  transform: scale(1.05);
}
.com-level-btn .lv-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.com-level-btn .lv-name { display: block; font-size: 13px; margin-bottom: 3px; }
.com-level-btn .lv-diff { display: block; font-size: 10px; color: rgba(255,255,255,0.45); font-family: 'Kosugi Maru', sans-serif; }

.btn-back {
  background: none; border: 1px solid rgba(255,255,255,0.25);
  border-radius: 50px; padding: 8px 22px;
  font-family: 'Fredoka One', cursive; font-size: 14px;
  color: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.2s;
}
.btn-back:hover { color: white; border-color: rgba(255,255,255,0.6); }

/* ── Combo flash (shared) ── */
#combo-flash {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 54px; color: var(--accent2);
  text-shadow: 0 0 40px #ffcc00, 0 0 80px #ffcc0066;
  pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.1s;
  white-space: nowrap;
}
#copyright {
  position: fixed; bottom: 8px; right: 12px;
  font-size: 10px; color: rgba(255,255,255,0.4);
  z-index: 50; letter-spacing: 0.5px;
}
#copyright a {
  color: rgba(255,255,255,0.7); text-decoration: none;
}
#copyright a:hover { color: rgba(255,255,255,1.0); }

#score-popup {
  position: fixed; font-size: 22px; font-family: 'Fredoka One', cursive;
  color: var(--accent3); text-shadow: var(--glow-cyan);
  pointer-events: none; z-index: 100; opacity: 0;
}

/* ── Game canvas shared ── */
#game-canvas {
  display: block; image-rendering: pixelated;
  border: 2px solid rgba(255,107,205,0.5); border-radius: 12px;
  box-shadow: 0 0 30px rgba(255,107,205,0.3), 0 0 60px rgba(255,107,205,0.1), inset 0 0 30px rgba(0,0,0,0.5);
}
#particle-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; border-radius: 12px; }

/* ════════════════════════════════════
   PC LAYOUT
════════════════════════════════════ */
[data-mode="pc"] #app {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  height: 100dvh;
}

[data-mode="pc"] #title {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 10; font-size: 22px; letter-spacing: 2px;
  color: var(--accent); text-shadow: var(--glow-pink); white-space: nowrap;
  animation: titlePulse 3s ease-in-out infinite;
}
[data-mode="pc"] #title span { color: var(--accent2); }
@keyframes titlePulse {
  0%,100%{text-shadow:var(--glow-pink);}
  50%{text-shadow:0 0 30px #ff6bcdcc,0 0 60px #ff6bcd66;}
}

[data-mode="pc"] #game-wrapper {
  display: flex; gap: 20px; align-items: flex-start; justify-content: center;
}

[data-mode="pc"] .side-panel { display: flex; flex-direction: column; gap: 10px; width: 160px; }

[data-mode="pc"] .info-box {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,107,205,0.3); border-radius: 16px;
  padding: 10px 14px; backdrop-filter: blur(10px);
  box-shadow: inset 0 0 20px rgba(255,107,205,0.05); transition: box-shadow 0.3s;
}
[data-mode="pc"] .info-box:hover {
  box-shadow: inset 0 0 20px rgba(255,107,205,0.1), 0 0 20px rgba(255,107,205,0.15);
}
[data-mode="pc"] .info-label {
  font-size: 11px; letter-spacing: 3px; color: var(--accent3);
  text-transform: uppercase; margin-bottom: 4px; text-shadow: var(--glow-cyan);
}
[data-mode="pc"] .info-value {
  font-size: 26px; color: var(--accent2); text-shadow: var(--glow-yellow);
  font-family: 'Fredoka One', cursive; line-height: 1;
}
[data-mode="pc"] .info-value.small { font-size: 18px; }
[data-mode="pc"] .two-stat { display: flex; gap: 16px; }
[data-mode="pc"] .two-stat > div { flex: 1; }

[data-mode="pc"] #next-canvas {
  border: 1px solid rgba(0,245,212,0.4); border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,245,212,0.2); display: block; margin: 0 auto;
}
[data-mode="pc"] #hold-canvas { display: block; margin: 0 auto; }

[data-mode="pc"] #level-bar-wrapper {
  height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 6px; overflow: hidden;
}
[data-mode="pc"] #level-bar {
  height: 100%; background: linear-gradient(90deg,var(--accent3),var(--accent));
  border-radius: 3px; transition: width 0.5s ease; box-shadow: 0 0 8px var(--accent3);
}
[data-mode="pc"] .controls {
  font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.6; letter-spacing: 0.5px;
}
[data-mode="pc"] .controls b { color: rgba(255,107,205,0.7); font-weight: normal; }
[data-mode="pc"] .donut-legend {
  display: grid; grid-template-columns: 1.4em 1fr; gap: 1px 4px;
  font-size: 10px; color: rgba(255,255,255,0.5);
  font-family: 'Kosugi Maru', sans-serif; line-height: 1.65;
}
[data-mode="pc"] .donut-legend span:nth-child(2n) {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ════════════════════════════════════
   MOBILE LAYOUT
════════════════════════════════════ */
[data-mode="mobile"] #app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  height: 100dvh; gap: 0;
}

[data-mode="mobile"] #topbar {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px 4px; background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,107,205,0.2);
  flex-shrink: 0;
}
[data-mode="mobile"] #title-top {
  font-size: 17px; color: var(--accent); text-shadow: 0 0 15px rgba(255,107,205,0.8); letter-spacing: 1px;
}
[data-mode="mobile"] .top-stats { display: flex; gap: 12px; align-items: center; }
[data-mode="mobile"] .stat-mini { text-align: center; line-height: 1.1; }
[data-mode="mobile"] .stat-mini .lbl { font-size: 8px; color: var(--accent3); letter-spacing: 2px; display: block; }
[data-mode="mobile"] .stat-mini .val { font-size: 15px; color: var(--accent2); text-shadow: 0 0 8px rgba(255,204,0,0.6); }

[data-mode="mobile"] #game-area {
  display: flex; align-items: flex-start; justify-content: center;
  gap: 8px; flex: 1; padding: 6px 4px 2px; min-height: 0;
}
[data-mode="mobile"] .side-mini { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
[data-mode="mobile"] .mini-box {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,107,205,0.25);
  border-radius: 10px; padding: 6px 8px; text-align: center; min-width: 60px;
}
[data-mode="mobile"] .mini-box .lbl { font-size: 8px; color: var(--accent3); letter-spacing: 1.5px; display: block; margin-bottom: 2px; }
[data-mode="mobile"] .mini-box .val { font-size: 17px; color: var(--accent2); text-shadow: 0 0 8px rgba(255,204,0,0.5); line-height: 1; }
[data-mode="mobile"] #game-canvas { border-width: 1.5px; border-radius: 10px; }

[data-mode="mobile"] #controls {
  width: 100%; display: grid;
  grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(2, 1fr);
  gap: 5px; padding: 5px 8px 10px; flex-shrink: 0;
}
[data-mode="mobile"] .ctrl-btn {
  background: rgba(255,107,205,0.1); border: 1.5px solid rgba(255,107,205,0.35);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; height: 50px; cursor: pointer; transition: all 0.1s; position: relative;
}
[data-mode="mobile"] .ctrl-btn.active {
  background: rgba(255,107,205,0.25); border-color: var(--accent);
  box-shadow: 0 0 12px rgba(255,107,205,0.5); transform: scale(0.93);
}
[data-mode="mobile"] .ctrl-btn.large { font-size: 14px; color: rgba(255,255,255,0.9); }

[data-mode="pc"] .icon-btn {
  background: rgba(255,107,205,0.1); border: 1px solid rgba(255,107,205,0.3);
  border-radius: 10px; width: 48px; height: 48px; font-size: 22px;
  cursor: pointer; color: white; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
[data-mode="pc"] .icon-btn:hover {
  background: rgba(255,107,205,0.25); box-shadow: 0 0 14px rgba(255,107,205,0.5);
  transform: scale(1.08);
}
[data-mode="pc"] .icon-btn:active { transform: scale(0.95); }

/* Battle Mode */
#battle-wrapper { display:none; gap:20px; justify-content:center; align-items:flex-start; padding:10px 16px; }
.battle-side { display:flex; flex-direction:column; align-items:center; gap:8px; }
.battle-head { font-size:11px; letter-spacing:3px; color:var(--accent3); text-transform:uppercase; }
.battle-scorebox { font-size:11px; color:rgba(255,255,255,.5); text-align:center; }
.battle-scorebox b { display:block; font-size:20px; color:var(--accent2); }
#battle-vs-col { display:flex; flex-direction:column; justify-content:center; align-items:center; gap:12px; min-width:48px; }
#battle-vs { font-size:22px; font-weight:bold; color:var(--accent); text-shadow:0 0 16px rgba(255,107,205,.8); letter-spacing:2px; }
.garbage-pill { background:rgba(255,107,205,.15); border:1px solid rgba(255,107,205,.3); border-radius:8px; padding:4px 8px; font-size:10px; color:rgba(255,255,255,.5); text-align:center; white-space:nowrap; }
#com-canvas { border:2px solid rgba(255,107,205,.5); border-radius:12px; box-shadow:0 0 20px rgba(255,107,205,.2); display:block; image-rendering:pixelated; }
#battle-game-canvas { display:block; image-rendering:pixelated; border:2px solid rgba(255,107,205,0.5); border-radius:12px; box-shadow:0 0 30px rgba(255,107,205,0.3); }
#battle-particle-canvas { position:absolute; inset:0; pointer-events:none; z-index:10; border-radius:12px; }
/* Settings modal */
#settings-overlay {
  display:none; position:fixed; inset:0; z-index:400;
  background:rgba(10,5,20,0.80); align-items:center; justify-content:center;
}
#settings-card {
  background:rgba(30,15,50,0.97); border:1px solid rgba(255,107,205,0.35);
  border-radius:18px; padding:28px 32px; min-width:280px; display:flex;
  flex-direction:column; gap:18px;
}
.settings-title { font-family:'Fredoka One',cursive; font-size:18px; color:var(--accent2); letter-spacing:2px; text-align:center; }
.settings-lbl { font-family:'Kosugi Maru',sans-serif; font-size:12px; color:rgba(255,255,255,.5); letter-spacing:1px; }
.slider-row { display:flex; align-items:center; gap:10px; margin-top:6px; }
.slider-row input[type=range] { flex:1; accent-color:var(--accent); }
.bgm-val { font-size:12px; color:var(--accent2); min-width:36px; text-align:right; font-family:'Fredoka One',cursive; }
#settings-close { background:rgba(255,107,205,0.15); border:1px solid rgba(255,107,205,0.35); border-radius:10px; padding:8px 0; font-family:'Kosugi Maru',sans-serif; font-size:13px; color:rgba(255,255,255,.7); cursor:pointer; transition:all .2s; }
#settings-close:hover { background:rgba(255,107,205,0.3); color:#fff; }
#battle-result {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(10,5,20,0.92);
  flex-direction:column; align-items:center; justify-content:center;
  gap:20px; text-align:center;
}
#battle-result h1 { font-size:clamp(2rem,5vw,3.5rem); font-family:'Fredoka One',cursive; color:var(--accent2); text-shadow:0 0 30px rgba(255,204,0,0.6); margin:0; }
#battle-result .sub { font-family:'Kosugi Maru',sans-serif; font-size:15px; line-height:2.2; color:rgba(255,255,255,.75); margin:0; }
#battle-result .btn-row { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
#battle-result .btn-menu { background:transparent; border:2px solid rgba(255,255,255,.25); border-radius:12px; padding:10px 22px; font-size:14px; font-family:'Kosugi Maru',sans-serif; color:rgba(255,255,255,.6); cursor:pointer; transition:all .2s; }
#battle-result .btn-menu:hover { border-color:rgba(255,255,255,.5); color:rgba(255,255,255,.9); }
</style>
</head>
<body>
<div class="scanlines"></div>
<canvas id="bg-canvas"></canvas>
<div id="combo-flash"></div>
<div id="score-popup"></div>
<div id="settings-overlay">
  <div id="settings-card">
    <div class="settings-title">⚙ SETTINGS</div>
    <div>
      <div class="settings-lbl">BGM ボリューム</div>
      <div class="slider-row">
        <input type="range" id="bgm-slider" min="0" max="100" value="30">
        <span class="bgm-val" id="bgm-val-label">30%</span>
      </div>
    </div>
    <button id="settings-close">閉じる</button>
  </div>
</div>
<div id="battle-result">
  <h1 id="battle-result-title"></h1>
  <div class="sub" id="battle-result-sub"></div>
  <div class="btn-row">
    <button class="btn" id="battle-result-retry">🔄 もう一度！</button>
    <button class="btn-menu" id="battle-result-menu">🏠 トップへもどる</button>
  </div>
</div>
<div id="app"></div>
<div id="copyright">© 2026 Seishi Murakami &nbsp;·&nbsp; <a href="https://forms.gle/p6uPiMjevGbG39Dd6" target="_blank">[サポート]</a> &nbsp;·&nbsp; v1.5.0</div>

<script>
// ════════════════════════════════════════════════════════
// DEVICE DETECTION
// ════════════════════════════════════════════════════════
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || ('ontouchstart' in window && window.innerWidth < 1024);

document.documentElement.setAttribute('data-mode', isMobile ? 'mobile' : 'pc');

// ════════════════════════════════════════════════════════
// LAYOUT CONSTANTS
// ════════════════════════════════════════════════════════
const COLS = 10, ROWS = 20;
let CELL, CW, CH, NEXT_SIZE, HOLD_W, HOLD_H;

if (isMobile) {
  const topH = 58, ctrlH = 122, pad = 18;
  const availH = window.innerHeight - topH - ctrlH - pad;
  const availW = window.innerWidth * 0.63;
  CELL = Math.max(18, Math.min(Math.floor(availH / ROWS), Math.floor(availW / COLS), 30));
  NEXT_SIZE = 60; HOLD_W = 60; HOLD_H = 50;
} else {
  CELL = 30;
  NEXT_SIZE = 110; HOLD_W = 110; HOLD_H = 80;
}
CW = COLS * CELL;
CH = ROWS * CELL;

// ════════════════════════════════════════════════════════
// DOM INJECTION
// ════════════════════════════════════════════════════════
const app = document.getElementById('app');

if (isMobile) {
  app.innerHTML = `
    <div id="topbar">
      <div id="title-top">🍩 DONUT DROP</div>
      <div class="top-stats">
        <div class="stat-mini"><span class="lbl">SCORE</span><span class="val" id="score-display">0</span></div>
        <div class="stat-mini"><span class="lbl">LEVEL</span><span class="val" id="level-display">1</span></div>
        <div class="stat-mini"><span class="lbl">LINES</span><span class="val" id="lines-display">0</span></div>
      </div>
    </div>
    <div id="game-area">
      <div class="side-mini">
        <div class="mini-box"><span class="lbl">NEXT</span><canvas id="next-canvas"></canvas></div>
        <div class="mini-box"><span class="lbl">HOLD</span><canvas id="hold-canvas"></canvas></div>
        <div class="mini-box"><span class="lbl">COMBO</span><span class="val" id="combo-display-box">0x</span></div>
      </div>
      <div style="position:relative;flex-shrink:0;">
        <canvas id="game-canvas"></canvas>
        <canvas id="particle-canvas"></canvas>
        <div id="overlay">
          <h1>🍩<br>DONUT DROP</h1>
          <div class="sub">ドーナツを並べてラインを消そう！<br><br>下のボタンまたはタッチで操作</div>
          <button class="btn" id="start-btn">🎮 スタート！</button>
        </div>
      </div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="btn-rotL">↺</button>
      <button class="ctrl-btn" id="btn-rotR">↻</button>
      <button class="ctrl-btn large" id="btn-hold">HOLD</button>
      <button class="ctrl-btn" id="btn-mute">🔊</button>
      <button class="ctrl-btn" id="btn-pause">⏸</button>
      <button class="ctrl-btn" id="btn-left">◀</button>
      <button class="ctrl-btn" id="btn-down">▼</button>
      <button class="ctrl-btn large" id="btn-drop">DROP</button>
      <button class="ctrl-btn" id="btn-right">▶</button>
      <button class="ctrl-btn" id="btn-reset">🔄</button>
    </div>
  `;
} else {
  app.innerHTML = `
    <div id="title">🍩 <span>DONUT DROP</span> 🍩</div>
    <div id="game-wrapper">
      <div class="side-panel">
        <div class="info-box"><div class="info-label">SCORE</div><div class="info-value" id="score-display">0</div></div>
        <div class="info-box">
          <div class="info-label">LEVEL</div><div class="info-value" id="level-display">1</div>

const SHAPES = [
  [[0,-1],[1,0],[0,1],[-1,0]],              // 0 diamond (もちもちリング)
  [[-2,0],[-1,0],[0,0],[1,0]],              // 1 I
  [[0,-1],[0,0],[0,1],[1,1]],               // 2 L
  [[0,-1],[0,0],[0,1],[-1,1]],              // 3 J
  [[-1,0],[0,0],[1,0],[0,-1]],              // 4 T
  [[0,0],[1,0],[0,1],[-1,1]],              // 5 S
  [[-1,0],[0,0],[0,1],[1,1]],              // 6 Z
  [[0,0],[-1,0],[1,0],[0,-1],[0,1]],       // 7 cross (5 cells)
  [[0,-1],[0,0],[0,1],[0,2],[1,2]],         // 8 big L (5 cells)
  [[0,0]],                                  // 9 single
  [[-1,-1],[0,0],[1,1]],                    // 10 diagonal
  [[-1,0],[1,0],[-1,1],[0,1],[1,1]],        // 11 U
  [[0,0],[1,0],[0,1]],                      // 12 corner
];
const SHAPE_WEIGHTS = [3,4,4,4,4,3,3,1,2,2,3,2,4];

function weightedRandom(weights) {
  let r = Math.random() * weights.reduce((a,b)=>a+b,0);
  for(let i=0;i<weights.length;i++) { r-=weights[i]; if(r<=0) return i; }
  return weights.length-1;
}

// ════════════════════════════════════════════════════════
// AUDIO ENGINE
// ════════════════════════════════════════════════════════
let audioCtx=null, muted=false, bgmGain=null, sfxGain=null, bgmStarted=false;
let bgmVolume=parseFloat(localStorage.getItem('donutBgmVolume')?? '0.3');

function initAudio() {
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  bgmGain = audioCtx.createGain(); bgmGain.gain.value=bgmVolume*0.18; bgmGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain(); sfxGain.gain.value=0.5;  sfxGain.connect(audioCtx.destination);
  startBGM();
}

function playTone(freq,type,dur,vol=1,start=0,dest=null) {
  if(!audioCtx||muted) return;
  const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
  osc.type=type; osc.frequency.value=freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime+start);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+start+dur);
  osc.connect(g); g.connect(dest||sfxGain);
  osc.start(audioCtx.currentTime+start); osc.stop(audioCtx.currentTime+start+dur);
}

function sfxMove()    { playTone(220,'sine',0.06,0.3); }
function sfxRotate()  { playTone(330,'square',0.08,0.2); }
function sfxDrop()    { playTone(110,'sawtooth',0.15,0.4); }
function sfxLineClear(n) { [523,659,784,1047].slice(0,n).forEach((f,i)=>playTone(f,'square',0.2,0.4,i*0.05)); }
function sfxLevelUp() { [523,659,784,1047,1319].forEach((f,i)=>playTone(f,'square',0.3,0.4,i*0.07)); }
function sfxGameOver(){ [523,494,440,392,349,294,247].forEach((f,i)=>playTone(f,'sawtooth',0.4,0.4,i*0.12)); }
function sfxHold()    { playTone(440,'triangle',0.1,0.3); playTone(660,'triangle',0.1,0.3,0.08); }
function sfxCombo(n)  { playTone(440*Math.pow(1.2,n),'square',0.15,0.5); }
function sfxSelect()  { playTone(880,'sine',0.15,0.45); playTone(1108,'sine',0.15,0.45,0.11); playTone(1320,'sine',0.22,0.55,0.22); }

function startBGM() {
  if(!audioCtx||bgmStarted) return;
  bgmStarted=true;
  const melody=[[392,0],[440,.3],[494,.6],[523,.9],[587,1.2],[659,1.5],[698,1.8],[784,2.1],[698,2.4],[659,2.7],[587,3],[523,3.3],[494,3.6],[440,3.9],[392,4.2],[330,4.5],[349,4.8],[392,5.1],[440,5.4],[494,5.7],[523,6],[587,6.3],[659,6.6],[784,6.9]];
  const bass=[[130,0],[130,.6],[146,1.2],[146,1.8],[155,2.4],[155,3],[130,3.6],[130,4.2],[146,4.8],[146,5.4],[174,6],[174,6.6]];
  const loopLen=7.2;
  let loopStart=audioCtx.currentTime;
  function sched(s) {
    melody.forEach(([f,t])=>playTone(f*.5,'square',.28,.5,s+t-audioCtx.currentTime,bgmGain));
    bass.forEach(([f,t])=>playTone(f,'sawtooth',.55,.4,s+t-audioCtx.currentTime,bgmGain));
  }
  function loop() {
    if(!audioCtx||muted){bgmStarted=false;return;}
    sched(loopStart); loopStart+=loopLen;
    setTimeout(loop,(loopLen-0.5)*1000);
  }
  loop();
}

function toggleMute() {
  muted=!muted;
  if(bgmGain) bgmGain.gain.value=muted?0:bgmVolume*0.18;
  const icon = muted ? '🔇' : '🔊';
  const btnMobile = document.getElementById('btn-mute');
  if(btnMobile) btnMobile.textContent=icon;

}

// PARTICLE SYSTEM
// ════════════════════════════════════════════════════════
const particles=[];

function spawnParticles(x,y,color,count=12) {
  for(let i=0;i<count;i++){
    const a=(Math.PI*2/count)*i+Math.random()*.5, sp=2+Math.random()*4;
    particles.push({
      x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,decay:.02+Math.random()*.03,size:4+Math.random()*6,
      color, shape:Math.random()>.5?'circle':'donut',
    });
  }
}
function spawnLineParticles(row) {
  for(let c=0;c<COLS;c++) spawnParticles(c*CELL+CELL/2,row*CELL+CELL/2,`hsl(${Math.random()*360},100%,70%)`,5);
}
function spawnDropParticles(x,y) {
  for(let i=0;i<6;i++) particles.push({
    x:x+CELL/2+(Math.random()-.5)*CELL, y:y+CELL/2,
    vx:(Math.random()-.5)*3, vy:-Math.random()*4,
    life:1, decay:.04, size:3+Math.random()*4, color:'#FFD700', shape:'star',
  });
}
function updateParticles() {
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.vx*=0.97; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles() {
  // バトルモードではbattle-particle-canvasに描画
  const pc = (gameMode==='battle' && battlePCtx) ? battlePCtx : pCtx;
  pc.clearRect(0,0,CW,CH);
  particles.forEach(p=>{
    pc.save(); pc.globalAlpha=p.life; pc.fillStyle=p.color;
    pc.translate(p.x,p.y);
    if(p.shape==='donut'){
      pc.beginPath(); pc.arc(0,0,p.size,0,Math.PI*2); pc.arc(0,0,p.size*.4,0,Math.PI*2,true); pc.fill();
    } else if(p.shape==='star'){
      drawStar(pc,0,0,4,p.size,p.size*.4);
    } else {
      pc.beginPath(); pc.arc(0,0,p.size,0,Math.PI*2); pc.fill();
    }
    pc.restore();
  });
}
function drawStar(c,cx,cy,spikes,outerR,innerR){
  let rot=(Math.PI/2)*3, step=Math.PI/spikes;
  c.beginPath(); c.moveTo(cx,cy-outerR);
  for(let i=0;i<spikes;i++){
    c.lineTo(cx+Math.cos(rot)*outerR,cy+Math.sin(rot)*outerR); rot+=step;
    c.lineTo(cx+Math.cos(rot)*innerR,cy+Math.sin(rot)*innerR); rot+=step;
  }
  c.lineTo(cx,cy-outerR); c.closePath(); c.fill();
}

// ════════════════════════════════════════════════════════
// DONUT DRAWING
// ════════════════════════════════════════════════════════
function drawDonut(c,x,y,sz,donut,alpha=1,time=0) {
  c.save(); c.globalAlpha=alpha; c.translate(x+sz/2,y+sz/2);
  const r=sz*.42, hr=sz*.16;

  if(donut.special==='ring'){
    const bumpR=r*.28, bc=8;
    c.beginPath(); c.arc(0,0,r*.72,0,Math.PI*2); c.arc(0,0,r*.38,0,Math.PI*2,true);
    const g=c.createRadialGradient(-r*.2,-r*.2,0,0,0,r);
    g.addColorStop(0,'#FFF8E7'); g.addColorStop(.5,donut.body); g.addColorStop(1,donut.glaze);
    c.fillStyle=g; c.fill();
    for(let i=0;i<bc;i++){
      const a=(Math.PI*2/bc)*i+time*.3, bx=Math.cos(a)*r*.56, by=Math.sin(a)*r*.56;
      const g2=c.createRadialGradient(bx-bumpR*.3,by-bumpR*.3,0,bx,by,bumpR);
      g2.addColorStop(0,'#FFF8E7'); g2.addColorStop(1,donut.body);
      c.beginPath(); c.arc(bx,by,bumpR,0,Math.PI*2); c.fillStyle=g2; c.fill();
    }
  } else if(donut.special==='crinkle'){
    c.beginPath();
    const pts=16;
    for(let i=0;i<=pts;i++){
      const a=(Math.PI*2/pts)*i, rr=r*(1+.1*Math.sin(a*6));
      if(i===0) c.moveTo(Math.cos(a)*rr,Math.sin(a)*rr); else c.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);
    }
    c.arc(0,0,hr,0,Math.PI*2,true);
    const g=c.createRadialGradient(-r*.2,-r*.2,0,0,0,r);
    g.addColorStop(0,'#D4A574'); g.addColorStop(.6,donut.body); g.addColorStop(1,donut.glaze);
    c.fillStyle=g; c.fill();
  } else {
    c.beginPath(); c.arc(0,0,r,0,Math.PI*2); c.arc(0,0,hr,0,Math.PI*2,true);
    const g=c.createRadialGradient(-r*.25,-r*.25,hr*.5,0,0,r);
    g.addColorStop(0,'#FFFFFF55'); g.addColorStop(.3,donut.body+'EE'); g.addColorStop(1,donut.glaze+'CC');
    c.fillStyle=g; c.fill();
    c.beginPath(); c.arc(0,-r*.05,r*.75,Math.PI+.5,-.5); c.arc(0,-r*.05,hr*1.1,-.5,Math.PI+.5,true);
    c.fillStyle=donut.glaze+'AA'; c.fill();
  }

  if(donut.sprinkles.length>0){
    for(let i=0;i<8;i++){
      const sa=(Math.PI*2/8)*i+time*.1, sr=hr+(r-hr)*.55+Math.sin(sa*3)*2;
      c.save(); c.translate(Math.cos(sa)*sr,Math.sin(sa)*sr); c.rotate(sa+Math.PI/4);
      c.fillStyle=donut.sprinkles[i%donut.sprinkles.length]; c.fillRect(-3,-1,6,2); c.restore();
    }
  }
  c.beginPath(); c.arc(-r*.2,-r*.3,r*.18,0,Math.PI*2); c.fillStyle='rgba(255,255,255,0.35)'; c.fill();
  c.shadowColor=donut.glaze; c.shadowBlur=8;
  c.beginPath(); c.arc(0,0,r*1.05,0,Math.PI*2); c.arc(0,0,hr*.9,0,Math.PI*2,true);
  c.strokeStyle=donut.glaze+'44'; c.lineWidth=2; c.stroke();
  c.restore();
}

function collides(p) {
  return p.cells.some(({dx,dy})=>{const nx=p.x+dx,ny=p.y+dy;return nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&grid[ny][nx]!==null);});
}
function rotatePiece(p,dir=1) {
  const rot=p.cells.map(({dx,dy})=>({dx:-dy*dir,dy:dx*dir}));
  for(const kx of [0,-1,1,-2,2]) for(const ky of [0,-1,1]){
    const k={...p,x:p.x+kx,y:p.y+ky,cells:rot};
    if(!collides(k)) return k;
  }
  return p;
}
function hardDrop(p) { let q={...p,cells:[...p.cells]};while(!collides({...q,y:q.y+1}))q.y++;return q; }

function spawnPiece() {
  if(!nextPieceData) nextPieceData=newPieceData();
  currentPiece=createPiece(nextPieceData); nextPieceData=newPieceData(); canHold=true;
  if(collides(currentPiece)) endGame();
}

function lockPiece(p) {
  p.cells.forEach(({dx,dy})=>{const nx=p.x+dx,ny=p.y+dy;if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS)grid[ny][nx]=p.donutIdx;});
  sfxDrop();
  p.cells.forEach(({dx,dy})=>{const nx=p.x+dx,ny=p.y+dy;if(ny>=0)spawnDropParticles(nx*CELL,ny*CELL);});
  checkLines(); spawnPiece();
}

function checkLines() {
  const cleared=[];
  for(let r=ROWS-1;r>=0;r--) if(grid[r].every(c=>c!==null && c!=='G')) cleared.push(r);
  if(cleared.length){
    cleared.forEach(r=>{spawnLineParticles(r);grid.splice(r,1);grid.unshift(Array(COLS).fill(null));});
    sfxLineClear(cleared.length);
    combo++; if(combo>1) sfxCombo(combo);
    shakeTimer=15;
    const earned=[0,100,300,600,1000][Math.min(cleared.length,4)]*level*combo;
    score+=earned; lines+=cleared.length;
    const nl=Math.floor(lines/10)+1;
    if(nl>level){level=nl;dropInterval=Math.max(100,700-(level-1)*60);sfxLevelUp();}
    if(combo>1) showCombo(combo);
    if(!isMobile) showScorePopup(earned);
    updateUI();
    // バトルモード時: ゴミラインをCOMへ送る
    if(gameMode==='battle'){
      const garbage=[0,0,1,2,4][Math.min(cleared.length,4)];
      if(garbage>0) pendingGarbageForCom+=garbage;
      updateGarbageIndicator();
    }
  } else { combo=0; }
  const cb=document.getElementById('combo-display-box');
  if(cb) cb.textContent=combo>0?combo+'x':'0x';
}

// ════════════════════════════════════════════════════════
// COM AI LOGIC
// ════════════════════════════════════════════════════════
function comCollides(p) {
  return p.cells.some(({dx,dy})=>{
    const nx=p.x+dx, ny=p.y+dy;
    return nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&comGrid[ny][nx]!==null);
  });
}

function comHardDrop(p) {
  let q={...p, cells:p.cells.map(c=>({...c}))};
  while(!comCollides({...q,y:q.y+1})) q.y++;
  return q;
}

function comRotatePiece(p,dir=1){
  const rot=p.cells.map(({dx,dy})=>({dx:-dy*dir,dy:dx*dir}));
  for(const kx of [0,-1,1,-2,2]) for(const ky of [0,-1,1]){
    const k={...p,x:p.x+kx,y:p.y+ky,cells:rot};
    if(!comCollides(k)) return k;
  }
  return p;
}

// ── 任意グリッド用ヘルパー（先読みで使用） ──────────────
function collidesOnGrid(p, grid){
  return p.cells.some(({dx,dy})=>{
    const nx=p.x+dx, ny=p.y+dy;
    return nx<0||nx>=COLS||ny>=ROWS||(ny>=0&&grid[ny][nx]!==null);
  });
}
function hardDropOnGrid(p, grid){
  let q={...p, cells:p.cells.map(c=>({...c}))};
  while(!collidesOnGrid({...q,y:q.y+1},grid)) q.y++;
  return q;
}
// グリッドを in-place でライン消去し、消去数を返す
function clearLinesOnGrid(grid){
  let cleared=0;
  for(let r=ROWS-1;r>=0;r--){
    if(grid[r].every(c=>c!==null&&c!=='G')){
      grid.splice(r,1); grid.unshift(Array(COLS).fill(null)); r++; cleared++;
    }
  }
  return cleared;
}
// 消去ライン数→ボーナス（2ライン以上を爆発的に優遇: 1=5, 2=40, 3=100, 4=200）
function lineBonus(n){ return [0,5,40,100,200][Math.min(n,4)]; }
// 4回転分のセル配列を返す
function getRotations(cells){
  const res=[cells]; let c=cells;
  for(let i=0;i<3;i++){ c=c.map(({dx,dy})=>({dx:-dy,dy:dx})); res.push(c); }
  return res;
}

// 盤面の構造評価（Dellacherie 6特徴 + 危険域ペナルティ）
// ライン消去後のグリッドを渡すこと
function comEvalBoard(g){
  // ── 列高さ ──
  const colH=Array(COLS).fill(0);
  for(let c=0;c<COLS;c++)
    for(let r=0;r<ROWS;r++)
      if(g[r][c]!==null){ colH[c]=ROWS-r; break; }

  // ── 穴：上に埋まったセルがある空きマス ──
  let holes=0;
  for(let c=0;c<COLS;c++){
    let inCol=false;
    for(let r=0;r<ROWS;r++){
      if(g[r][c]!==null) inCol=true;
      else if(inCol) holes++;
    }
  }

  // ── 行方向切り替わり数（Row Transitions） ──
  let rowTrans=0;
  for(let r=0;r<ROWS;r++){
    let prev=1; // 左壁=埋まり
    for(let c=0;c<COLS;c++){
      const cur=g[r][c]!==null?1:0;
      if(cur!==prev) rowTrans++;
      prev=cur;
    }
    if(prev===0) rowTrans++; // 右壁との切り替わり
  }

  // ── 列方向切り替わり数（Column Transitions） ──
  let colTrans=0;
  for(let c=0;c<COLS;c++){
    let prev=1; // 底壁=埋まり
    for(let r=ROWS-1;r>=0;r--){
      const cur=g[r][c]!==null?1:0;
      if(cur!==prev) colTrans++;
      prev=cur;
    }
  }

  // ── ウェル：両側が塞がれた縦穴の累積深さ ──
  // 深さkのウェルは1+2+...+k のコストを加算
  let wells=0;
  for(let c=0;c<COLS;c++){
    let depth=0;
    for(let r=0;r<ROWS;r++){
      if(g[r][c]===null){
        const lFull=c===0||g[r][c-1]!==null;
        const rFull=c===COLS-1||g[r][c+1]!==null;
        if(lFull&&rFull){ depth++; wells+=depth; }
        else depth=0;
      } else depth=0;
    }
  }

  const aggH=colH.reduce((s,h)=>s+h,0);
  const maxH=Math.max(0,...colH);

  // 高さが危険域(>12)に近づくほど急激にペナルティ増加
  const danger=maxH>12?(maxH-12)*2.5:0;

  return -aggH*0.4 - maxH*0.5 - danger - holes*4.0 - rowTrans*0.8 - colTrans*0.5 - wells*0.35;
}

function comBestMove(piece){
  let bestScore=-Infinity, bestX=piece.x, bestCells=piece.cells, bestY=piece.y;
  let p={...piece, cells:piece.cells.map(c=>({...c}))};
  for(let rot=0;rot<4;rot++){
    for(let x=0;x<COLS;x++){
      const candidate={...p, x};
      if(comCollides(candidate)) continue;
      const dropped=comHardDrop(candidate);
      const testGrid=comGrid.map(row=>[...row]);
      dropped.cells.forEach(({dx,dy})=>{
        const nx=dropped.x+dx, ny=dropped.y+dy;
        if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS) testGrid[ny][nx]=dropped.donutIdx??0;
      });
      const n=clearLinesOnGrid(testGrid);
      const sc=lineBonus(n)+comEvalBoard(testGrid);
      if(sc>bestScore){
        bestScore=sc; bestX=dropped.x; bestCells=dropped.cells.map(c=>({...c})); bestY=dropped.y;
      }
    }
    p=comRotatePiece(p,1);
  }
  return {x:bestX, cells:bestCells, y:bestY};
}

function comSpawnPiece(){
  if(!comNextData) comNextData=newPieceData();
  comCurrentPiece=createPiece(comNextData);
  comCurrentPiece.cells=SHAPES[comNextData.shapeIdx].map(([dx,dy])=>({dx,dy}));
  comNextData=newPieceData();
  if(comCollides(comCurrentPiece)) comEndGame();
}

function comLockAndProcess(finalX, finalCells, finalY){
  // ロック
  finalCells.forEach(({dx,dy})=>{
    const nx=finalX+dx, ny=finalY+dy;
    if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS) comGrid[ny][nx]=comCurrentPiece?comCurrentPiece.donutIdx:0;
  });
  // ライン消去
  const cleared=[];
  for(let r=ROWS-1;r>=0;r--) if(comGrid[r].every(c=>c!==null&&c!=='G')) cleared.push(r);
  if(cleared.length){
    cleared.forEach(r=>{comGrid.splice(r,1);comGrid.unshift(Array(COLS).fill(null));});
    comCombo++;
    const earned=[0,100,300,600,1000][Math.min(cleared.length,4)]*comLevel*comCombo;
    comScore+=earned; comLines_count+=cleared.length;
    const nl=Math.floor(comLines_count/10)+1;
    if(nl>comLevel) comLevel=nl;
    // ゴミラインをプレイヤーへ送る
    const garbage=[0,0,1,2,4][Math.min(cleared.length,4)];
    if(garbage>0) pendingGarbageForPlayer+=garbage;
    const cbs=document.getElementById('com-battle-score');
    if(cbs) cbs.textContent=comScore.toLocaleString();
  } else { comCombo=0; }
  comCurrentPiece=null;
  comSpawnPiece();
}

// Lv3 専用: 2手先読みで最良手を選ぶ
function comBestMoveLv3(piece, nextData){
  if(!nextData) return comBestMove(piece); // フォールバック
  const nextCells=SHAPES[nextData.shapeIdx].map(([dx,dy])=>({dx,dy}));
  const nextDonut=nextData.donutIdx;
  let bestScore=-Infinity, bestMove=null;

  for(const rCells of getRotations(piece.cells)){
    for(let x=0;x<COLS;x++){
      const p={...piece, x, cells:rCells};
      if(collidesOnGrid(p, comGrid)) continue;
      const d=hardDropOnGrid(p, comGrid);

      // 1手目を置く
      const g1=comGrid.map(r=>[...r]);
      rCells.forEach(({dx,dy})=>{
        const nx=d.x+dx, ny=d.y+dy;
        if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS) g1[ny][nx]=piece.donutIdx??0;
      });
      const n1=clearLinesOnGrid(g1);
      const sc1=lineBonus(n1)+comEvalBoard(g1);

      // 2手目（次のピース）で最高スコアを探す
      let bestNext=-Infinity;
      for(const r2 of getRotations(nextCells)){
        for(let x2=0;x2<COLS;x2++){
          const p2={x:x2, y:0, cells:r2};
          if(collidesOnGrid(p2, g1)) continue;
          const d2=hardDropOnGrid(p2, g1);
          const g2=g1.map(r=>[...r]);
          r2.forEach(({dx,dy})=>{
            const nx=d2.x+dx, ny=d2.y+dy;
            if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS) g2[ny][nx]=nextDonut;
          });
          const n2=clearLinesOnGrid(g2);
          const sc=lineBonus(n2)+comEvalBoard(g2);
          if(sc>bestNext) bestNext=sc;
        }
      }

      // 1手目評価 × 0.2 + 2手目最良評価 × 0.8
      const total=sc1*0.2+(bestNext===-Infinity?sc1:bestNext)*0.8;
      if(total>bestScore){
        bestScore=total;
        bestMove={x:d.x, cells:rCells.map(c=>({...c})), y:d.y};
      }
    }
  }
  return bestMove??comBestMove(piece);
}

// 全候補手をスコア付きで列挙する
function comAllMoves(piece){
  const moves=[];
  let p={...piece, cells:piece.cells.map(c=>({...c}))};
  for(let rot=0;rot<4;rot++){
    for(let x=0;x<COLS;x++){
      const candidate={...p, x};
      if(comCollides(candidate)) continue;
      const dropped=comHardDrop(candidate);
      const testGrid=comGrid.map(row=>[...row]);
      dropped.cells.forEach(({dx,dy})=>{
        const nx=dropped.x+dx, ny=dropped.y+dy;
        if(ny>=0&&ny<ROWS&&nx>=0&&nx<COLS) testGrid[ny][nx]=dropped.donutIdx??0;
      });
      const n=clearLinesOnGrid(testGrid);
      moves.push({x:dropped.x, cells:dropped.cells, y:dropped.y, score:lineBonus(n)+comEvalBoard(testGrid)});
    }
    p=comRotatePiece(p,1);
  }
  return moves;
}

function comDoMove(){
  if(!comCurrentPiece||!comRunning) return;
  let best;
  const rand=Math.random();

  if(comLv===1){
    // 50%ベスト、50%全候補からランダム（回転も含む）
    const moves=comAllMoves(comCurrentPiece);
    if(!moves.length) return;
    if(rand<0.5){
      best=moves.reduce((a,b)=>a.score>b.score?a:b);
    } else {
      best=moves[Math.floor(Math.random()*moves.length)];
    }
  } else if(comLv===2){
    // 85%ベスト、15%上位5手からランダム（惜しいミス）
    const moves=comAllMoves(comCurrentPiece);
    if(!moves.length) return;
    if(rand<0.85){
      best=moves.reduce((a,b)=>a.score>b.score?a:b);
    } else {
      const top5=moves.sort((a,b)=>b.score-a.score).slice(0,5);
      best=top5[Math.floor(Math.random()*top5.length)];
    }
  } else {
    // Lv3: 2手先読み
    best=comBestMoveLv3(comCurrentPiece, comNextData);
  }
  comLockAndProcess(best.x, best.cells, best.y);
}

function comTick(dt){
  if(!comRunning||!comCurrentPiece) return;
  comDropTimer+=dt;
  if(comDropTimer>=comDropInterval){
    comDropTimer=0;
    comDoMove();
  }
}

function comDrawBoard(){
  const cc=document.getElementById('com-canvas');
  if(!cc) return;
  const cCtx=cc.getContext('2d');
  const bCW=COLS*BATTLE_CELL, bCH=ROWS*BATTLE_CELL;
  cCtx.clearRect(0,0,bCW,bCH);
  // グリッド線
  cCtx.strokeStyle='rgba(255,255,255,0.04)'; cCtx.lineWidth=1;
  for(let c=0;c<=COLS;c++){cCtx.beginPath();cCtx.moveTo(c*BATTLE_CELL,0);cCtx.lineTo(c*BATTLE_CELL,bCH);cCtx.stroke();}
  for(let r=0;r<=ROWS;r++){cCtx.beginPath();cCtx.moveTo(0,r*BATTLE_CELL);cCtx.lineTo(bCW,r*BATTLE_CELL);cCtx.stroke();}
  // セル描画
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=comGrid[r][c];
    if(cell==='G'){
      cCtx.fillStyle='#3a3a5c';
      cCtx.fillRect(c*BATTLE_CELL+1,r*BATTLE_CELL+1,BATTLE_CELL-2,BATTLE_CELL-2);
      cCtx.fillStyle='rgba(255,255,255,0.08)';
      cCtx.fillRect(c*BATTLE_CELL+1,r*BATTLE_CELL+1,BATTLE_CELL-2,2);
    } else if(cell!==null){
      drawDonut(cCtx,c*BATTLE_CELL+1,r*BATTLE_CELL+1,BATTLE_CELL-2,DONUTS[cell],1,gameTime*.05);
    }
  }
  // COMの現在ピース（落下位置プレビュー）
  if(comCurrentPiece){
    const ghost=comHardDrop(comCurrentPiece);
    const donut=DONUTS[comCurrentPiece.donutIdx];
    ghost.cells.forEach(({dx,dy})=>{
      const nx=ghost.x+dx,ny=ghost.y+dy;
      if(ny>=0){
        cCtx.save();cCtx.globalAlpha=0.3;
        cCtx.fillStyle=donut.glaze;
        cCtx.fillRect(nx*BATTLE_CELL+2,ny*BATTLE_CELL+2,BATTLE_CELL-4,BATTLE_CELL-4);
        cCtx.restore();
      }
    });
    comCurrentPiece.cells.forEach(({dx,dy})=>{
      const nx=comCurrentPiece.x+dx,ny=comCurrentPiece.y+dy;
      if(ny>=0) drawDonut(cCtx,nx*BATTLE_CELL+1,ny*BATTLE_CELL+1,BATTLE_CELL-2,donut,1,gameTime*.1);
    });
  }
}

function holdPiece() {
  if(!canHold) return;
  sfxHold(); canHold=false;
  if(!holdPieceData){holdPieceData={shapeIdx:currentPiece.shapeIdx,donutIdx:currentPiece.donutIdx};spawnPiece();}
  else{const t=holdPieceData;holdPieceData={shapeIdx:currentPiece.shapeIdx,donutIdx:currentPiece.donutIdx};currentPiece=createPiece(t);}

}

function getDrawCtx(){
  // バトルモードではbattle-game-canvasに描画
  if(gameMode==='battle' && battleCtx) return battleCtx;
  return ctx;
}

function drawGrid() {
  const dc = getDrawCtx();
  dc.strokeStyle='rgba(255,255,255,0.04)'; dc.lineWidth=1;
  for(let c=0;c<=COLS;c++){dc.beginPath();dc.moveTo(c*CELL,0);dc.lineTo(c*CELL,CH);dc.stroke();}
  for(let r=0;r<=ROWS;r++){dc.beginPath();dc.moveTo(0,r*CELL);dc.lineTo(CW,r*CELL);dc.stroke();}
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=grid[r][c];
    if(cell==='G'){
      dc.fillStyle='#3a3a5c';
      dc.fillRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
      dc.fillStyle='rgba(255,255,255,0.08)';
      dc.fillRect(c*CELL+1,r*CELL+1,CELL-2,2);
    } else if(cell!==null){
      drawDonut(dc,c*CELL+1,r*CELL+1,CELL-2,DONUTS[cell],1,gameTime*.05);
    }
  }
}

function drawCurrentPiece() {
  if(!currentPiece) return;
  const dc = getDrawCtx();
  const ghost=hardDrop(currentPiece), donut=DONUTS[currentPiece.donutIdx];
  ghost.cells.forEach(({dx,dy})=>{
    const nx=ghost.x+dx,ny=ghost.y+dy;
    if(ny>=0){dc.save();dc.globalAlpha=0.2;dc.beginPath();
      dc.arc(nx*CELL+CELL/2,ny*CELL+CELL/2,CELL*.38,0,Math.PI*2);
      dc.arc(nx*CELL+CELL/2,ny*CELL+CELL/2,CELL*.14,0,Math.PI*2,true);
      dc.strokeStyle=donut.glaze;dc.lineWidth=2;dc.stroke();dc.restore();}
  });
  currentPiece.cells.forEach(({dx,dy})=>{
    const nx=currentPiece.x+dx,ny=currentPiece.y+dy;
    if(ny>=0) drawDonut(dc,nx*CELL+1,ny*CELL+1,CELL-2,donut,1,gameTime*.1);
  });
}

function drawNext() {
  if(!nextCtx) return;
  nextCtx.clearRect(0,0,NEXT_SIZE,NEXT_SIZE);
  if(!nextPieceData) return;
  const donut=DONUTS[nextPieceData.donutIdx], cells=SHAPES[nextPieceData.shapeIdx];
  const minX=Math.min(...cells.map(([dx])=>dx)), maxX=Math.max(...cells.map(([dx])=>dx));
  const minY=Math.min(...cells.map(([,dy])=>dy)), maxY=Math.max(...cells.map(([,dy])=>dy));
  const sc=Math.min(NEXT_SIZE*0.2, (NEXT_SIZE-10)/Math.max(maxX-minX+1,maxY-minY+1));
  const ox=NEXT_SIZE/2-((minX+maxX)/2)*sc, oy=NEXT_SIZE/2-((minY+maxY)/2)*sc;
  cells.forEach(([dx,dy])=>drawDonut(nextCtx,ox+dx*sc-sc/2+1,oy+dy*sc-sc/2+1,sc-2,donut,1,gameTime*.1));
}

function drawHold() {
  if(!holdCtx) return;
  holdCtx.clearRect(0,0,HOLD_W,HOLD_H);
  if(!holdPieceData) return;
  const donut=DONUTS[holdPieceData.donutIdx], cells=SHAPES[holdPieceData.shapeIdx];
  const minX=Math.min(...cells.map(([dx])=>dx)), maxX=Math.max(...cells.map(([dx])=>dx));
  const minY=Math.min(...cells.map(([,dy])=>dy)), maxY=Math.max(...cells.map(([,dy])=>dy));
  const sc=Math.min(HOLD_H*0.4, (Math.min(HOLD_W,HOLD_H)-8)/Math.max(maxX-minX+1,maxY-minY+1));
  const ox=HOLD_W/2-((minX+maxX)/2)*sc, oy=HOLD_H/2-((minY+maxY)/2)*sc;
  holdCtx.globalAlpha=canHold?1:.4;
  cells.forEach(([dx,dy])=>drawDonut(holdCtx,ox+dx*sc-sc/2+1,oy+dy*sc-sc/2+1,sc-2,donut,1,gameTime*.1));
}

// ════════════════════════════════════════════════════════
// UI UPDATES
// ════════════════════════════════════════════════════════
function updateUI() {
  document.getElementById('score-display').textContent=score.toLocaleString();
  document.getElementById('level-display').textContent=level;
  document.getElementById('lines-display').textContent=lines;
  const lb=document.getElementById('level-bar');
  if(lb) lb.style.width=((lines%10)*10)+'%';
  if(score>hiScore){
    hiScore=score; localStorage.setItem('donutHiScore',hiScore);
    const h=document.getElementById('hiscore-display');
    if(h) h.textContent=hiScore.toLocaleString();
  }
  // バトルモード時のプレイヤースコア更新
  const pbs=document.getElementById('player-battle-score');
  if(pbs) pbs.textContent=score.toLocaleString();
}

let comboTO=null;
function showCombo(n) {
  const el=document.getElementById('combo-flash');
  el.textContent=n+'x COMBO! 🍩'; el.style.opacity='1';
  clearTimeout(comboTO); comboTO=setTimeout(()=>{el.style.opacity='0';},800);
}

let popupTO=null;
const popupEl=document.getElementById('score-popup');
function showScorePopup(pts) {
  popupEl.textContent='+'+pts.toLocaleString();
  const rect=gameCanvas.getBoundingClientRect();
  popupEl.style.top=(rect.top+100)+'px'; popupEl.style.left=(rect.left+CW/2-30)+'px';
  popupEl.style.opacity='1'; popupEl.style.transform='scale(1.2)';
  clearTimeout(popupTO);
  popupTO=setTimeout(()=>{popupEl.style.opacity='0';popupEl.style.transform='scale(1)';},600);
}

// ════════════════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════════════════
function gameLoop(ts) {
  if(!gameRunning) return;
  const dt=ts-lastTime; lastTime=ts; gameTime++;
  drawBg();

  const dc = getDrawCtx();
  dc.clearRect(0,0,CW,CH); dc.save();
  if(!gamePaused){
    if(shakeTimer>0){const a=shakeTimer*.5;dc.translate((Math.random()-.5)*a,(Math.random()-.5)*a);shakeTimer--;}
    if(currentPiece) currentPiece.time++;
    dropTimer+=dt;
    if(dropTimer>=dropInterval){
      dropTimer=0;
      if(currentPiece){const m={...currentPiece,y:currentPiece.y+1};if(!collides(m))currentPiece=m;else lockPiece(currentPiece);}
    }
  }
  drawGrid(); drawCurrentPiece(); dc.restore();
  updateParticles(); drawParticles(); drawNext();

  // COM tick (バトルモード時のみ)
  if(gameMode==='battle' && comRunning){
    comTick(dt);
    // ゴミライン送付
    if(pendingGarbageForPlayer>0){ addGarbageToGrid(grid,pendingGarbageForPlayer); pendingGarbageForPlayer=0; }
    if(pendingGarbageForCom>0){ addGarbageToGrid(comGrid,pendingGarbageForCom); pendingGarbageForCom=0; updateGarbageIndicator(); }
    comDrawBoard();
  }

  requestAnimationFrame(gameLoop);
}

// ════════════════════════════════════════════════════════
// KEYBOARD INPUT (always active)
// ════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(!gameRunning) return;
  if(e.key==='p'||e.key==='P'){gamePaused=!gamePaused;return;}
  if(e.key==='m'||e.key==='M'){toggleMute();return;}
  if(e.key==='r'||e.key==='R'){resetGame();return;}
  if(gamePaused||!currentPiece) return;
  e.preventDefault();
  if(e.key==='ArrowLeft'){const m={...currentPiece,x:currentPiece.x-1};if(!collides(m)){currentPiece=m;sfxMove();}}
  else if(e.key==='ArrowRight'){const m={...currentPiece,x:currentPiece.x+1};if(!collides(m)){currentPiece=m;sfxMove();}}
  else if(e.key==='ArrowDown'){dropTimer=dropInterval;score+=1;updateUI();}
  else if(e.key==='ArrowUp'){currentPiece=rotatePiece(currentPiece,1);sfxRotate();}
  else if(e.key==='z'||e.key==='Z'){currentPiece=rotatePiece(currentPiece,-1);sfxRotate();}
  else if(e.key===' '){const d=hardDrop(currentPiece);score+=(d.y-currentPiece.y)*2;currentPiece=d;lockPiece(currentPiece);updateUI();}
  else if(e.key==='c'||e.key==='C'){holdPiece();}
});

// ════════════════════════════════════════════════════════
// MOBILE TOUCH & BUTTON CONTROLS
// ════════════════════════════════════════════════════════
if(isMobile) {
  // Touch swipe on canvas
  let tx0=0,ty0=0,txL=0,tMoved=false;
  gameCanvas.addEventListener('touchstart',e=>{
    if(!gameRunning||gamePaused)return;
    const t=e.touches[0]; tx0=txL=t.clientX; ty0=t.clientY; tMoved=false;
  },{passive:true});
  gameCanvas.addEventListener('touchmove',e=>{
    if(!gameRunning||gamePaused||!currentPiece)return;
    e.preventDefault();
    const t=e.touches[0],dx=t.clientX-txL,dy=t.clientY-ty0;
    if(Math.abs(t.clientX-tx0)>12||Math.abs(dy)>12) tMoved=true;
    if(Math.abs(dx)>CELL*.8){
      const dir=dx>0?1:-1, m={...currentPiece,x:currentPiece.x+dir};
      if(!collides(m)){currentPiece=m;sfxMove();} txL=t.clientX;
    }
    if(dy>30) dropTimer=dropInterval;
  },{passive:false});
  gameCanvas.addEventListener('touchend',e=>{
    if(!gameRunning||gamePaused||!currentPiece)return;
    if(!tMoved){currentPiece=rotatePiece(currentPiece,1);sfxRotate();}
    const sy=e.changedTouches[0].clientY-ty0;
    if(sy>70){const d=hardDrop(currentPiece);score+=(d.y-currentPiece.y)*2;currentPiece=d;lockPiece(currentPiece);updateUI();}
  },{passive:true});

  // Button helpers
  function btnPress(id,fn) {
    const btn=document.getElementById(id); if(!btn)return;
    let iv=null;
    const start=()=>{fn();iv=setInterval(fn,150);btn.classList.add('active');};
    const stop=()=>{clearInterval(iv);iv=null;btn.classList.remove('active');};
    btn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();start();},{passive:false});
    btn.addEventListener('touchend',e=>{e.preventDefault();stop();},{passive:false});
    btn.addEventListener('mousedown',()=>{initAudio();start();});
    ['mouseup','mouseleave'].forEach(ev=>btn.addEventListener(ev,stop));
  }
  function btnTap(id,fn) {
    const btn=document.getElementById(id); if(!btn)return;
    btn.addEventListener('touchstart',e=>{e.preventDefault();initAudio();fn();btn.classList.add('active');},{passive:false});
    btn.addEventListener('touchend',e=>{e.preventDefault();btn.classList.remove('active');},{passive:false});
    btn.addEventListener('click',()=>{initAudio();fn();});
  }

  btnPress('btn-left', ()=>{ if(!gameRunning||gamePaused||!currentPiece)return; const m={...currentPiece,x:currentPiece.x-1};if(!collides(m)){currentPiece=m;sfxMove();} });
  btnPress('btn-right',()=>{ if(!gameRunning||gamePaused||!currentPiece)return; const m={...currentPiece,x:currentPiece.x+1};if(!collides(m)){currentPiece=m;sfxMove();} });
  btnPress('btn-down', ()=>{ if(!gameRunning||gamePaused||!currentPiece)return; dropTimer=dropInterval;score+=1;updateUI(); });
  btnTap('btn-rotR',   ()=>{ if(!gameRunning||gamePaused||!currentPiece)return; currentPiece=rotatePiece(currentPiece,1);sfxRotate(); });
  btnTap('btn-rotL',   ()=>{ if(!gameRunning||gamePaused||!currentPiece)return; currentPiece=rotatePiece(currentPiece,-1);sfxRotate(); });
  btnTap('btn-reset',  ()=>{ resetGame(); });
  btnTap('btn-drop',   ()=>{ if(!gameRunning||gamePaused||!currentPiece)return; const d=hardDrop(currentPiece);score+=(d.y-currentPiece.y)*2;currentPiece=d;lockPiece(currentPiece);updateUI(); });
  btnTap('btn-hold',   ()=>{ if(!gameRunning||gamePaused)return; holdPiece(); });
  btnTap('btn-pause',  ()=>{ if(!gameRunning)return; gamePaused=!gamePaused; const b=document.getElementById('btn-pause');if(b)b.textContent=gamePaused?'▶':'⏸'; });
  btnTap('btn-mute',   ()=>toggleMute());
}

// PC用ボタン（モバイルのときはDOMが存在しないので、あれば登録する）
const btnMutePc = document.getElementById('btn-mute-pc');
if(btnMutePc) btnMutePc.addEventListener('click', ()=>{ toggleMute(); });

const btnResetPc = document.getElementById('btn-reset-pc');
if(btnResetPc) btnResetPc.addEventListener('click', ()=>{ resetGame(); });

// Settings
const btnSettingsPc = document.getElementById('btn-settings-pc');
const settingsOverlay = document.getElementById('settings-overlay');
const bgmSlider = document.getElementById('bgm-slider');
const bgmValLabel = document.getElementById('bgm-val-label');
if(btnSettingsPc && settingsOverlay){
  // スライダーの初期値をlocalStorageから復元
  const initPct = Math.round(bgmVolume*100);
  bgmSlider.value = initPct;
  bgmValLabel.textContent = initPct+'%';

  btnSettingsPc.addEventListener('click',()=>{
    settingsOverlay.style.display='flex';
  });
  document.getElementById('settings-close').addEventListener('click',()=>{
    settingsOverlay.style.display='none';
  });
  settingsOverlay.addEventListener('click', e=>{
    if(e.target===settingsOverlay) settingsOverlay.style.display='none';
  });
  bgmSlider.addEventListener('input',()=>{
    bgmVolume = bgmSlider.value/100;
    localStorage.setItem('donutBgmVolume', bgmVolume);
    bgmValLabel.textContent = bgmSlider.value+'%';
    if(bgmGain && !muted) bgmGain.gain.value = bgmVolume*0.18;
  });
}

// ════════════════════════════════════════════════════════
// OVERLAY ボタンイベント (モード選択)
// ════════════════════════════════════════════════════════
function setupOverlayButtons(){
  // 対戦ボタン
  const battleBtn=document.getElementById('battle-btn');
  if(battleBtn){
    battleBtn.addEventListener('click',()=>{
      initAudio(); sfxSelect();
      const modeRow=document.getElementById('mode-btn-row');
      const subEl=document.querySelector('#overlay .sub');
      const h1El=document.querySelector('#overlay h1');
      const comSel=document.getElementById('com-select');
      if(modeRow) modeRow.style.display='none';
      if(subEl) subEl.style.display='none';
      if(h1El) h1El.style.display='none';
      if(comSel) comSel.style.display='block';
    });
  }

  // 戻るボタン
  const backBtn=document.getElementById('back-to-mode');
  if(backBtn){
    backBtn.addEventListener('click',()=>{
      const modeRow=document.getElementById('mode-btn-row');
      const subEl=document.querySelector('#overlay .sub');
      const h1El=document.querySelector('#overlay h1');
      const comSel=document.getElementById('com-select');
      if(comSel) comSel.style.display='none';
      if(modeRow) modeRow.style.display='flex';
      if(subEl) subEl.style.display='block';
      if(h1El) h1El.style.display='block';
    });
  }

  // COMレベル選択ボタン
  const lvBtns=document.querySelectorAll('.com-level-btn');
  lvBtns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      initAudio(); sfxSelect();
      const lv=parseInt(btn.dataset.lv);
      startBattleMode(lv);
    });
  });

  // バトル結果オーバーレイのボタン
  document.getElementById('battle-result-retry').addEventListener('click',()=>{
    document.getElementById('battle-result').style.display='none';
    startBattleMode(comLv);
  });
  document.getElementById('battle-result-menu').addEventListener('click',()=>{
    document.getElementById('battle-result').style.display='none';
    returnToModeSelect();
  });
}

// ════════════════════════════════════════════════════════
// START / END
// ════════════════════════════════════════════════════════
function resetGame() {
  if(gameMode==='battle'){
    comRunning=false;
    // battle-wrapperを隠してgame-wrapperを戻す
    const bw=document.getElementById('battle-wrapper');
    const gw=document.getElementById('game-wrapper');
    if(bw) bw.style.display='none';
    if(gw) gw.style.display='flex';
    // CELLを元に戻す
    if(!isMobile){ CELL=30; CW=COLS*CELL; CH=ROWS*CELL; gameCanvas.width=CW; gameCanvas.height=CH; pCanvas.width=CW; pCanvas.height=CH; }
    gameMode='solo';
  }
  gameRunning=false;
  startGame();
}

function startGame() {
  initAudio();
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) grid[r][c]=null;
  particles.length=0;
  score=0;lines=0;level=1;combo=0;dropInterval=700;dropTimer=0;gameTime=0;
  currentPiece=null;nextPieceData=null;holdPieceData=null;canHold=true;gamePaused=false;shakeTimer=0;
  if(holdCtx) holdCtx.clearRect(0,0,HOLD_W,HOLD_H);
  updateUI();
  const ov=document.getElementById('overlay');
  if(ov) ov.style.display='none';
  gameRunning=true; spawnPiece(); nextPieceData=newPieceData();
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function startBattleMode(lv){
  gameMode='battle';
  comLv=lv;
  comDropInterval=COM_INFO[lv].interval;

  // バトルレイアウトに切替（PCのみ）
  if(!isMobile){
    const gw=document.getElementById('game-wrapper');
    const bw=document.getElementById('battle-wrapper');
    if(gw) gw.style.display='none';
    if(bw) bw.style.display='flex';

    // 両ボードをBATTLE_CELLサイズにリサイズ
    CELL=BATTLE_CELL;
    CW=COLS*CELL; CH=ROWS*CELL;

    // battle-game-canvasのサイズ設定
    if(battleGameCanvas){ battleGameCanvas.width=CW; battleGameCanvas.height=CH; }
    if(battlePCanvas){ battlePCanvas.width=CW; battlePCanvas.height=CH; }

    const cc=document.getElementById('com-canvas');
    if(cc){ cc.width=CW; cc.height=CH; }

    // COM名前を表示
    const cn=document.getElementById('com-name-display');
    if(cn) cn.textContent=COM_INFO[lv].emoji+' '+COM_INFO[lv].name;
  }

  // COMグリッド初期化
  comGrid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  comCurrentPiece=null; comNextData=null;
  comScore=0; comLines_count=0; comLevel=1; comCombo=0;
  comDropTimer=0; comRunning=true;
  pendingGarbageForPlayer=0; pendingGarbageForCom=0;

  // COMスコア表示リセット
  const cbs=document.getElementById('com-battle-score');
  if(cbs) cbs.textContent='0';

  comSpawnPiece();

  // プレイヤーゲーム開始
  startGame();
}

function endGame() {
  gameRunning=false; sfxGameOver();
  if(score>hiScore){hiScore=score;localStorage.setItem('donutHiScore',hiScore);}

  if(gameMode==='battle'){
    showBattleResult(false);
  } else {
    setTimeout(()=>{
      const ov=document.getElementById('overlay');
      ov.style.display='flex';
      ov.innerHTML=`
        <h1>🍩 GAME OVER!</h1>
        <div class="sub">
          スコア: <b style="color:#ffcc00;font-size:1.4em">${score.toLocaleString()}</b><br>
          ハイスコア: ${hiScore.toLocaleString()}<br>
          レベル ${level} / ${lines}ライン
        </div>
        <button class="btn" id="start-btn">🔄 もう一度！</button>
      `;
      document.getElementById('start-btn').addEventListener('click',startGame);
    },800);
  }
}

// 初回のスタートボタン
const initStartBtn=document.getElementById('start-btn');
if(initStartBtn) initStartBtn.addEventListener('click',()=>{ initAudio(); sfxSelect(); startGame(); });

// オーバーレイボタン初期セットアップ（PC版）
if(!isMobile) setupOverlayButtons();

// Background loop (always running)
(function bgLoop(){drawBg();requestAnimationFrame(bgLoop);})();
</script>
